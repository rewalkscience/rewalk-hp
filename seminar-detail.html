<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>歩行分析の再構成 | Rewalk</title>
  <meta name="description" content="歩行観察の所見を介入選択・再評価へつなげる実践セミナー。2026年6月22日（日）20:00 オンライン開催。残席わずか。">
  <meta property="og:title" content="歩行分析の再構成 | Rewalk">
  <meta property="og:description" content="歩行観察の所見を介入選択・再評価へつなげる実践セミナー。2026年6月22日（日）20:00 オンライン開催。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      background: #fff;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    /* ナビ（ヒーロー上に絶対配置） */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5vw;
      border-bottom: 1px solid rgba(255,255,255,.15);
      position: absolute;
      left: 0; right: 0; top: 0;
      z-index: 10;
      color: #fff;
    }
    .logo { display: inline-flex; align-items: center; }
    .logo-wrap {
      padding: 7px 10px;
      border-radius: var(--radius-ui);
      background: rgba(255,255,255,.92);
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    .logo img { display: block; width: 160px; height: auto; }
    .links {
      display: flex;
      gap: 28px;
      font-size: 14px;
      font-weight: 600;
      align-items: center;
    }
    .links a { color: rgba(255,255,255,.88); }
    .links a:hover { color: #fff; }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
      transition: all .2s ease;
      backdrop-filter: blur(8px);
    }
    .nav-cta:hover { background: rgba(255,255,255,.25); }
    /* ハンバーガー */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: all .2s ease;
    }
    #menu-toggle { display: none; }
    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      background: rgba(11,31,61,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.1);
      padding: 8px 5vw 16px;
      position: relative;
      z-index: 9;
    }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,.88);
    }
    .mobile-menu a:last-child { border-bottom: none; }
    #menu-toggle:checked ~ .mobile-menu { display: flex; }
    /* ヒーロー */
    .hero {
      min-height: 640px;
      display: grid;
      align-items: end;
      padding: 120px 5vw 80px;
      color: #fff;
      background: radial-gradient(120% 140% at 80% 0%, #16407c 0%, var(--dark) 55%),
                  url("assets/seminar-gait-analysis.png") center/cover no-repeat;
      background-blend-mode: overlay, normal;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(5,20,42,.88), rgba(5,20,42,.44));
    }
    .hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,.12);
    }
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 820px;
    }
    .tag {
      display: inline-flex;
      padding: 7px 14px;
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(42px, 6vw, 82px);
      line-height: 1.1;
      letter-spacing: -0.015em;
      font-weight: 800;
    }
    .summary {
      margin: 26px 0 0;
      max-width: 620px;
      line-height: 1.9;
      color: rgba(255,255,255,.82);
      font-weight: 500;
    }
    /* メインレイアウト */
    .wrap {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 48px;
      padding: 80px 5vw 96px;
      align-items: start;
    }
    .main { display: grid; gap: 48px; }
    .section {
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 48px;
    }
    h2 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    p, li { line-height: 1.9; }
    p { color: var(--muted); }
    ul { margin: 0; padding-left: 1.2em; }
    li { color: var(--muted); }
    /* サイドバー */
    .side {
      position: sticky;
      top: 28px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-card);
    }
    .side-img {
      aspect-ratio: 16/10;
      background: linear-gradient(rgba(8,28,56,.08), rgba(8,28,56,.22)), url("assets/seminar-gait-analysis.png") center/cover no-repeat;
    }
    .side-body { padding: 26px; }
    .info {
      display: grid;
      gap: 16px;
      margin-bottom: 26px;
      color: var(--muted);
      font-size: 14px;
    }
    .info strong {
      display: block;
      color: var(--ink);
      font-size: 22px;
      font-weight: 700;
      font-family: "Inter", sans-serif;
      margin-top: 4px;
    }
    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      transition: all .2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,.4); }
    .note {
      margin-top: 16px;
      padding: 14px;
      background: var(--pale);
      border-radius: var(--radius-ui);
      color: var(--navy);
      font-size: 13px;
      line-height: 1.7;
    }
    /* カリキュラム */
    .curriculum { display: grid; gap: 12px; }
    .item {
      padding: 18px 20px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-ui);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      transition: all .2s ease;
    }
    .item:hover { background: var(--pale); }
    .item strong { font-weight: 700; font-family: "Inter", sans-serif; }
    /* 講師 */
    .speaker {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 22px;
      align-items: center;
    }
    .avatar {
      width: 120px;
      aspect-ratio: 1;
      border-radius: var(--radius-card);
      background: linear-gradient(135deg, var(--pale), #fff);
      border: 1px solid var(--line-soft);
      display: grid;
      place-items: center;
      color: var(--navy);
      font-weight: 700;
      font-size: 13px;
    }
    /* セクション内画像 */
    .section-img {
      margin-top: 22px;
      aspect-ratio: 16/9;
      border-radius: var(--radius-card);
    }
    @media (max-width: 768px) {
      .nav { padding: 18px 20px; }
      .links { display: none; }
      .hamburger { display: flex; }
      .hero { padding: 110px 20px 56px; }
      .wrap { grid-template-columns: 1fr; padding: 56px 20px; gap: 32px; }
      .side { position: static; }
      .speaker { grid-template-columns: 1fr; }
    }
    @media (min-width: 769px) and (max-width: 900px) {
      .nav { padding: 20px 24px; }
      .links { gap: 14px; font-size: 12px; }
      .hero { padding: 120px 24px 60px; }
      .wrap { padding: 56px 24px; }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="menu-toggle" aria-hidden="true">
  <header class="nav">
    <a class="logo" href="index.html">
      <span class="logo-wrap"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></span>
    </a>
    <nav class="links">
      <a href="index.html">セミナー</a>
      <a href="seminars.html">一覧</a>
      <a href="science.html">Rewalk Science</a>
      <a href="auth-login.html">ログイン</a>
      <a class="nav-cta" href="seminar-apply.html">申し込む</a>
    </nav>
    <label class="hamburger" for="menu-toggle" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </label>
  </header>
  <nav class="mobile-menu">
    <a href="index.html">セミナー</a>
    <a href="seminars.html">一覧</a>
    <a href="science.html">Rewalk Science</a>
    <a href="auth-login.html">ログイン</a>
    <a href="seminar-apply.html">申し込む</a>
  </nav>
  <section class="hero">
    <div class="hero-content">
      <span class="tag" id="s-tag">読み込み中...</span>
      <h1 id="s-title"></h1>
      <p class="summary" id="s-summary"></p>
    </div>
  </section>
  <main class="wrap">
    <div class="main">
      <section class="section" id="s-body">
        <p style="color:var(--muted)">読み込み中...</p>
      </section>
    </div>
    <aside class="side">
      <div class="side-img"></div>
      <div class="side-body">
        <div class="info">
          <span>開催日時<strong id="s-date">-</strong></span>
          <span>形式<strong id="s-format">-</strong></span>
          <span>参加費<strong id="s-price">-</strong></span>
          <span>残席<strong id="s-remaining">-</strong></span>
        </div>
        <a class="button" id="s-apply" href="#">申込フォームへ進む</a>
        <div class="note">申込完了後、確認メールとLINE登録案内をお送りします。</div>
      </div>
    </aside>
  </main>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    async function loadSeminar() {
      const id = new URLSearchParams(location.search).get('id')
      if (!id) { location.href = 'seminars.html'; return }
      try {
        const s = await apiFetch(`/seminars/${encodeURIComponent(id)}`, { redirectOn401: false })
        const remaining = Math.max(0, (s.capacity ?? 0) - (s.enrolled_count ?? 0))
        const formatLabel = s.format === 'offline' ? '対面' : 'オンライン'
        document.title = `${s.title} | Rewalk`
        document.getElementById('s-tag').textContent = `${formatLabel} / ${rwFormatDate(s.date)}`
        document.getElementById('s-title').textContent = s.title
        document.getElementById('s-summary').textContent = rwStripHtml(s.description).slice(0, 160)
        // 本文（管理画面のリッチエディタで入力されたHTML）
        document.getElementById('s-body').innerHTML = s.description || '<p>詳細は準備中です。</p>'
        // サムネイルがあればサイド画像に反映
        if (s.thumbnail_url) {
          const sideImg = document.querySelector('.side-img')
          if (sideImg) sideImg.style.background = `url('${s.thumbnail_url}') center/cover no-repeat`
        }
        document.getElementById('s-date').textContent = rwFormatDate(s.date)
        document.getElementById('s-format').textContent = `${formatLabel}（${s.location}）`
        document.getElementById('s-price').textContent = rwFormatPrice(s.price)
        document.getElementById('s-remaining').textContent = remaining > 0 ? `${remaining}名` : '満席'
        const now = Date.now()
        const beforeStart = s.enrollment_start && now < new Date(s.enrollment_start).getTime()
        const afterEnd = s.enrollment_end && now > new Date(s.enrollment_end).getTime()
        const applyBtn = document.getElementById('s-apply')
        if (remaining > 0 && s.status === 'published' && !beforeStart && !afterEnd) {
          applyBtn.href = `seminar-apply.html?id=${encodeURIComponent(s.id)}`
        } else {
          applyBtn.textContent = remaining === 0 ? '満席のため受付終了'
            : beforeStart ? `申込受付開始前（${rwFormatDate(s.enrollment_start)}〜）`
            : afterEnd ? '申込受付は終了しました'
            : '現在申込を受け付けていません'
          applyBtn.style.pointerEvents = 'none'
          applyBtn.style.opacity = '.5'
        }
      } catch (e) {
        document.getElementById('s-tag').textContent = 'セミナーが見つかりません'
        document.getElementById('s-title').textContent = '掲載終了または準備中です'
      }
    }
    loadSeminar()
  </script>
</body>
</html>
