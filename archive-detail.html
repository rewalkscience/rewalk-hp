<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アーカイブ詳細 | Rewalk</title>
  <meta name="description" content="立脚期の安定性を高める評価のポイント — 歩行分析の評価視点を臨床判断へつなげるRewalkアーカイブ動画。購入後30日間視聴可能。">
  <meta property="og:title" content="アーカイブ詳細 | Rewalk">
  <meta property="og:description" content="立脚期の安定性を高める評価のポイント — 歩行分析の評価視点を臨床判断へつなげるRewalkアーカイブ動画。購入後30日間視聴可能。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--white);
      letter-spacing: 0;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; transition: all .2s ease; }

    /* ナビ */
    #menu-toggle { display: none; }
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5vw;
      background: rgba(255,255,255,.85);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(16px) saturate(1.4);
    }
    .logo img { display: block; width: 176px; height: auto; }
    .nav-links {
      display: flex;
      gap: 28px;
      font-weight: 600;
      font-size: 14px;
      align-items: center;
    }
    .nav-links a[href="archive.html"] { color: var(--blue); }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all .2s ease;
    }
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-soft);
      padding: 8px 5vw 16px;
    }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 15px;
      font-weight: 600;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    #menu-toggle:checked ~ .mobile-menu { display: flex; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(2) { opacity: 0; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ヒーロー */
    .hero {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 48px;
      padding: 64px 5vw 96px;
      background: linear-gradient(180deg, var(--pale) 0%, var(--white) 100%);
    }
    .video {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-card);
      background:
        linear-gradient(rgba(7,31,61,.08), rgba(7,31,61,.36)),
        url("assets/archive-clinical-reasoning.png") center / cover no-repeat;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 48px;
      box-shadow: var(--shadow-pop);
      transition: all .2s ease;
    }
    .video:hover { transform: scale(1.01); }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--navy);
    }
    h1 {
      margin: 12px 0 18px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.015em;
    }
    .lead {
      color: var(--muted);
      line-height: 1.9;
      margin: 0 0 24px;
      font-weight: 500;
    }
    .buy {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      background: var(--white);
      box-shadow: var(--shadow-card);
    }
    .price {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      font-family: "Inter", sans-serif;
      color: var(--ink);
    }
    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 50px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: all .2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.4); }

    /* コンテンツ */
    .content {
      padding: 56px 5vw 96px;
      max-width: 960px;
    }
    .content h2 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin: 0 0 20px;
      border-bottom: 2px solid var(--line-soft);
      padding-bottom: 12px;
    }
    .content li { line-height: 2; }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; padding: 48px 24px 72px; gap: 32px; }
      .content { padding: 40px 24px 72px; }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="menu-toggle">
  <div class="nav-wrap">
    <header class="nav">
      <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
      <nav class="nav-links">
        <a href="archive.html">アーカイブ</a>
        <a href="science.html">事業紹介</a>
        <a href="mypage.html" class="nav-cta">マイページ</a>
      </nav>
      <label for="menu-toggle" class="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </label>
    </header>
    <nav class="mobile-menu">
      <a href="archive.html">アーカイブ</a>
      <a href="science.html">事業紹介</a>
      <a href="mypage.html">マイページ</a>
    </nav>
  </div>

  <main>
    <section class="hero">
      <div class="video">▶</div>
      <div>
        <span class="eyebrow">Archive Video</span>
        <h1 id="a-title">読み込み中...</h1>
        <p class="lead" id="a-desc"></p>
        <div class="buy">
          <div class="price" id="a-price">-</div>
          <a class="button" id="a-buy" href="#">購入して視聴権を取得</a>
        </div>
        <p id="a-error" style="display:none;color:#DC2626;font-size:14px;font-weight:600;margin-top:12px"></p>
      </div>
    </section>
    <section class="content">
      <h2>内容</h2>
      <p id="a-body" style="line-height:1.9"></p>
    </section>
  </main>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    const archiveId = new URLSearchParams(location.search).get('id')

    function showErr(msg) {
      const el = document.getElementById('a-error')
      el.textContent = msg
      el.style.display = 'block'
    }

    async function init() {
      if (!archiveId) { location.href = 'archive.html'; return }
      try {
        // 未ログインでも表示できるよう、まず公開一覧から取得
        const list = await apiFetch('/archives', { redirectOn401: false })
        const a = (list || []).find(x => x.id === archiveId)
        if (!a) { document.getElementById('a-title').textContent = 'アーカイブが見つかりません'; return }
        document.title = `${a.title} | Rewalk`
        document.getElementById('a-title').textContent = a.title
        document.getElementById('a-desc').textContent = a.description || ''
        document.getElementById('a-body').textContent = a.description || ''
        document.getElementById('a-price').textContent = rwFormatPrice(a.price)

        // ログイン済みなら購入状態を確認
        if (rwToken()) {
          const detail = await apiFetch(`/archives/${encodeURIComponent(archiveId)}`, { redirectOn401: false })
          if (detail && detail.purchased) {
            const btn = document.getElementById('a-buy')
            btn.textContent = '視聴する（購入済み）'
            btn.href = `mypage-video.html?id=${encodeURIComponent(archiveId)}`
            btn.dataset.purchased = '1'
          }
        }
      } catch (e) {
        showErr('情報の取得に失敗しました。再読み込みしてください。')
      }
    }

    document.getElementById('a-buy').addEventListener('click', async (e) => {
      const btn = e.currentTarget
      if (btn.dataset.purchased) return // 視聴ページへの通常遷移
      e.preventDefault()
      if (!rwToken()) { location.href = 'auth-login.html'; return }
      btn.textContent = '決済ページへ移動中...'
      btn.style.pointerEvents = 'none'
      try {
        const data = await apiFetch(`/archives/${encodeURIComponent(archiveId)}/checkout`, { method: 'POST' })
        location.href = data.url
      } catch (err) {
        showErr(err.message || '決済の準備に失敗しました')
        btn.textContent = '購入して視聴権を取得'
        btn.style.pointerEvents = 'auto'
      }
    })

    init()
  </script>
</body>
</html>
