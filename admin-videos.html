<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面の動画管理。販売中の動画コンテンツの一覧確認・新規登録ができます。">
  <meta name="robots" content="noindex">
  <title>動画管理 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: #F1F5FB;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { text-decoration: none; color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      min-height: 100vh;
    }
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    .main { padding: 36px 40px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 20px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: var(--white);
      font-weight: 700;
      font-size: 13.5px;
      transition: all .2s ease;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
    }
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,.38);
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    tbody td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }
    tbody tr:last-child td { border-bottom: none; }
    .url { color: var(--muted); font-size: 12px; font-family: ui-monospace, Consolas, monospace; }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a class="active" href="admin-videos.html">動画管理</a>
        <a href="admin-users.html">会員一覧</a>
        <a href="admin-coupons.html">クーポン管理</a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <h1>動画管理</h1>
        <a class="button" href="#" onclick="openForm();return false">新規登録</a>
      </div>
      <section class="panel">
        <table>
          <thead>
            <tr>
              <th scope="col">タイトル</th>
              <th scope="col">Drive URL</th>
              <th scope="col">価格</th>
              <th scope="col">公開</th><th scope="col">操作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="5" style="color:var(--muted)">読み込み中...</td></tr>
          </tbody>
        </table>
      </section>
      <section class="panel" id="form-panel" style="display:none;margin-top:20px;padding:20px">
        <h2 id="form-title" style="margin:0 0 16px;font-size:16px">アーカイブ動画を登録</h2>
        <div style="display:grid;gap:12px;max-width:560px">
          <label style="font-size:13px;font-weight:600">タイトル<input id="f-title" type="text" style="width:100%;margin-top:4px;padding:10px;border:1px solid var(--line);border-radius:8px"></label>
          <label style="font-size:13px;font-weight:600">説明<textarea id="f-desc" rows="3" style="width:100%;margin-top:4px;padding:10px;border:1px solid var(--line);border-radius:8px"></textarea></label>
          <label style="font-size:13px;font-weight:600">Google Drive URL<input id="f-url" type="text" placeholder="https://drive.google.com/file/d/..." style="width:100%;margin-top:4px;padding:10px;border:1px solid var(--line);border-radius:8px"></label>
          <label style="font-size:13px;font-weight:600">価格（円）<input id="f-price" type="number" value="0" style="width:100%;margin-top:4px;padding:10px;border:1px solid var(--line);border-radius:8px"></label>
          <label style="font-size:13px;font-weight:600">状態
            <select id="f-status" style="width:100%;margin-top:4px;padding:10px;border:1px solid var(--line);border-radius:8px">
              <option value="draft">下書き</option>
              <option value="published">公開</option>
            </select>
          </label>
          <div style="display:flex;gap:10px">
            <button class="button" onclick="saveArchive()">保存</button>
            <button onclick="closeForm()" style="padding:10px 16px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer">キャンセル</button>
          </div>
          <p id="f-error" style="display:none;color:#DC2626;font-size:13px;font-weight:600;margin:0"></p>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    let editingId = null
    let cache = []

    async function loadArchives() {
      if (!requireAdmin()) return
      const rows = document.getElementById('rows')
      try {
        const list = await apiFetch('/admin/archives')
        cache = list || []
        if (cache.length === 0) {
          rows.innerHTML = '<tr><td colspan="5" style="color:var(--muted)">登録済みの動画はありません。</td></tr>'
          return
        }
        rows.innerHTML = cache.map(a => `
            <tr>
              <td>${rwEscape(a.title)}</td>
              <td class="url">${rwEscape((a.video_url || '').slice(0, 40))}...</td>
              <td>${rwFormatPrice(a.price)}</td>
              <td>${a.status === 'published' ? '公開' : '下書き'}</td>
              <td><button onclick="delArchive('${a.id}')" style="padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:12px">削除</button></td>
            </tr>`).join('')
      } catch (err) {
        rows.innerHTML = `<tr><td colspan="5" style="color:var(--muted)">${rwEscape(err.message)}</td></tr>`
      }
    }

    function openForm() {
      editingId = null
      document.getElementById('form-panel').style.display = 'block'
    }
    function closeForm() {
      document.getElementById('form-panel').style.display = 'none'
    }

    async function saveArchive() {
      const errEl = document.getElementById('f-error')
      errEl.style.display = 'none'
      const body = {
        title: document.getElementById('f-title').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        video_url: document.getElementById('f-url').value.trim(),
        price: Number(document.getElementById('f-price').value || 0),
        status: document.getElementById('f-status').value,
      }
      if (!body.title || !body.video_url) {
        errEl.textContent = 'タイトルとDrive URLは必須です'
        errEl.style.display = 'block'
        return
      }
      try {
        await apiFetch('/admin/archives', { method: 'POST', body: JSON.stringify(body) })
        closeForm()
        loadArchives()
      } catch (err) {
        errEl.textContent = err.message
        errEl.style.display = 'block'
      }
    }

    async function delArchive(id) {
      if (!confirm('この動画を削除しますか？')) return
      try {
        await apiFetch(`/admin/archives/${id}`, { method: 'DELETE' })
        loadArchives()
      } catch (err) {
        alert(err.message)
      }
    }

    loadArchives()
  </script>
</body>
</html>
