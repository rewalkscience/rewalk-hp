<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規登録 | Rewalk</title>
  <meta name="description" content="Rewalkに新規登録。セミナー申込・購入済みアーカイブの視聴・申込履歴の確認ができます。">
  <meta property="og:title" content="新規登録 | Rewalk">
  <meta property="og:description" content="Rewalkに新規登録。セミナー申込・購入済みアーカイブの視聴・申込履歴の確認ができます。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --green: #128C7E;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      background: linear-gradient(180deg, var(--pale), #fff 360px);
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    /* ナビ */
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5vw;
      background: rgba(255,255,255,.85);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(16px) saturate(1.4);
    }
    .logo img { width: 176px; display: block; height: auto; }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
      transition: all .2s ease;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 72px 24px 96px;
      display: grid;
      grid-template-columns: .8fr 1.2fr;
      gap: 34px;
      align-items: start;
    }
    .intro { padding-top: 18px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--navy);
    }
    h1 {
      margin: 14px 0 18px;
      font-size: clamp(34px,5vw,64px);
      line-height: 1.1;
      letter-spacing: -0.015em;
      font-weight: 800;
    }
    .intro p { color: var(--muted); line-height: 1.9; font-weight: 500; }
    .panel {
      background: #fff;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      padding: 28px;
      box-shadow: var(--shadow-card);
    }
    .grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      padding: 13px;
      font: inherit;
      color: var(--ink);
      background: #fff;
      transition: all .2s ease;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .full { grid-column: 1 / -1; }
    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 22px;
      border-radius: var(--radius-ui);
      border: 0;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(37,99,235,.35);
    }
    .line-box {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid rgba(18,140,126,.24);
      border-radius: var(--radius-ui);
      background: #F3FFFC;
    }
    .line-box strong { display: block; color: var(--green); font-weight: 700; margin-bottom: 6px; }
    .line-box p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .note { margin-top: 14px; color: var(--muted); font-size: 12px; line-height: 1.7; }
    @media (max-width:900px) {
      .wrap, .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
    <a class="nav-cta" href="auth-login.html">ログイン</a>
  </header>
  <main class="wrap">
    <section class="intro">
      <span class="eyebrow">Register</span>
      <h1>新規登録</h1>
      <p>セミナー申込、購入済みアーカイブの視聴、申込履歴の確認に利用します。</p>
    </section>
    <section class="panel">
      <div class="grid">
        <label>氏名<input type="text" placeholder="田村 翔太郎"></label>
        <label>メールアドレス<input type="email" placeholder="name@example.com"></label>
        <label>所属<input type="text" placeholder="所属施設・事業所"></label>
        <label>職種
          <select>
            <option>理学療法士</option>
            <option>作業療法士</option>
            <option>言語聴覚士</option>
            <option>医師</option>
            <option>その他</option>
          </select>
        </label>
        <label class="full">パスワード<input type="password" placeholder="8文字以上"></label>
      </div>
      <div class="line-box">
        <strong>公式LINE登録でクーポンを受け取れます</strong>
        <p>登録後の案内メールから公式LINEへ進むと、対象セミナーで使えるクーポンコードを受け取れます。</p>
      </div>
      <a class="button" href="mypage.html">登録して進む</a>
      <p class="note">登録後、申込確認や視聴案内のメールを送信します。送信や削除ではありません。まだモックです、落ち着いてください。</p>
    </section>
  </main>
</body>
</html>
