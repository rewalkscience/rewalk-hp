<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>クーポン管理 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <style>
    :root{--navy:#1A4B8C;--blue:#2563EB;--green:#128C7E;--ink:#1A1A2E;--muted:#667085;--line:#DCE6F5;--dark:#061b35;--pale:#F0F5FF}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans JP","Inter",system-ui,sans-serif;color:var(--ink);background:#F7FAFF}
    a{text-decoration:none;color:inherit}
    .shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .side{background:var(--dark);color:#fff;padding:28px 22px}
    .logo{display:flex;gap:10px;align-items:center;margin-bottom:34px;font-weight:900}
    .logo img{width:34px}
    .side nav{display:grid;gap:8px}
    .side a{padding:12px 14px;border-radius:6px;color:rgba(255,255,255,.72);font-weight:800;font-size:14px}
    .side a.active{background:rgba(37,99,235,.22);color:#fff}
    .main{padding:34px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:24px}
    h1{margin:0;font-size:36px}
    .button{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 16px;border-radius:6px;background:var(--blue);color:#fff;font-weight:900}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:22px;align-items:start}
    .panel{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
    .panel h2{margin:0;padding:20px 22px;border-bottom:1px solid var(--line);font-size:20px}
    .form{display:grid;gap:14px;padding:22px}
    label{display:grid;gap:8px;color:var(--muted);font-size:13px;font-weight:900}
    input,select{min-height:44px;border:1px solid var(--line);border-radius:6px;padding:0 12px;font:inherit;background:#fff}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:16px;border-bottom:1px solid var(--line);font-size:14px}
    th{color:var(--muted);font-size:12px}
    .code{font-weight:900;color:var(--navy)}
    .status{display:inline-flex;align-items:center;min-height:28px;padding:0 10px;border-radius:999px;background:#EAFBF5;color:var(--green);font-weight:900;font-size:12px}
    .note{padding:16px 22px;color:var(--muted);font-size:13px;line-height:1.8;border-top:1px solid var(--line);background:#FBFDFF}
    @media(max-width:900px){.shell,.grid{grid-template-columns:1fr}.side{position:static}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html"><img src="assets/logo/rewalk-logo-mark.png" alt="">Admin</a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-videos.html">動画管理</a>
        <a href="admin-users.html">会員一覧</a>
        <a class="active" href="admin-coupons.html">クーポン管理</a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <h1>クーポン管理</h1>
        <a class="button" href="#">新規クーポンを保存</a>
      </div>
      <div class="grid">
        <section class="panel">
          <h2>LINE配布用クーポン</h2>
          <div class="form">
            <label>コード<input value="LINE2026"></label>
            <label>対象<select><option>歩行分析の再構成</option><option>すべての公開セミナー</option></select></label>
            <label>割引方式<select><option>固定額</option><option>割合</option></select></label>
            <label>割引額<input value="1000"></label>
            <label>有効期限<input value="2027-05-31"></label>
            <label>利用上限<input value="300"></label>
          </div>
          <p class="note">LINEでコードを配布し、申込フォームで入力された時だけサーバー側で検証して割引します。</p>
        </section>
        <section class="panel">
          <h2>発行済み</h2>
          <table>
            <tr><th>コード</th><th>対象</th><th>割引</th><th>利用</th><th>期限</th><th>状態</th></tr>
            <tr><td class="code">LINE2026</td><td>歩行分析の再構成</td><td>¥1,000</td><td>24 / 300</td><td>2027.05.31</td><td><span class="status">有効</span></td></tr>
            <tr><td class="code">WELCOME500</td><td>すべての公開セミナー</td><td>¥500</td><td>86 / 500</td><td>2026.12.31</td><td><span class="status">有効</span></td></tr>
          </table>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
