<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面の申込者一覧。セミナーへの申込状況・決済状態を一覧で確認できます。">
  <meta name="robots" content="noindex">
  <title>申込者一覧 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: #F1F5FB;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { text-decoration: none; color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      min-height: 100vh;
    }
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    .main { padding: 36px 40px; }
    h1 {
      margin: 0 0 28px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    tbody td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }
    tbody tr:last-child td { border-bottom: none; }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a href="admin-seminars.html">セミナー管理</a>
        <a class="active" href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-videos.html">動画管理</a>
        <a href="admin-users.html">会員一覧</a>
        <a href="admin-coupons.html">クーポン管理</a>
      </nav>
    </aside>
    <main class="main">
      <h1>申込者一覧</h1>
      <section class="panel">
        <table>
          <thead>
            <tr>
              <th scope="col">氏名</th>
              <th scope="col">メール</th>
              <th scope="col">セミナー</th>
              <th scope="col">決済</th>
              <th scope="col">申込日</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>田村 翔太郎</td>
              <td>shotaro@example.com</td>
              <td>歩行分析の再構成</td>
              <td>paid</td>
              <td>2026.05.20</td>
            </tr>
            <tr>
              <td>佐藤 花子</td>
              <td>hanako@example.com</td>
              <td>装具療法の実践</td>
              <td>paid</td>
              <td>2026.05.19</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
