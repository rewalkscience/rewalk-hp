<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rewalk Science Logo Preview</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Inter, system-ui, sans-serif;
      color: #1A1A2E;
      background: #f7faff;
    }
    h1 { margin: 0 0 28px; font-size: 28px; }
    .grid {
      display: grid;
      gap: 22px;
      max-width: 1080px;
    }
    .card {
      border: 1px solid #DCE6F5;
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(45deg, #e8eef8 25%, transparent 25%),
        linear-gradient(-45deg, #e8eef8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e8eef8 75%),
        linear-gradient(-45deg, transparent 75%, #e8eef8 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }
    .label {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #DCE6F5;
      font-size: 13px;
      font-weight: 800;
      color: #1A4B8C;
    }
    .preview {
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 34px;
    }
    img { max-width: 100%; max-height: 260px; }
  </style>
</head>
<body>
  <h1>Rewalk Science Logo Preview</h1>
  <div class="grid">
    <section class="card">
      <div class="label">01 / Logo + business name below</div>
      <div class="preview"><img src="rewalk-science-stacked.svg" alt="Rewalk Science stacked logo"></div>
    </section>
    <section class="card">
      <div class="label">02 / Logo mark only</div>
      <div class="preview"><img src="rewalk-science-mark.svg" alt="Rewalk Science mark"></div>
    </section>
    <section class="card">
      <div class="label">03 / Logo + business name on right</div>
      <div class="preview"><img src="rewalk-science-horizontal.svg" alt="Rewalk Science horizontal logo"></div>
    </section>
  </div>
</body>
</html>
