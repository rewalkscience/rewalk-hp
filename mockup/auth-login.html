<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | Rewalk</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <style>
    :root { --navy:#1A4B8C; --blue:#2563EB; --ink:#1A1A2E; --muted:#667085; --line:#DCE6F5; --pale:#F0F5FF; --dark:#061b35; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); font-family:"Noto Sans JP","Inter",system-ui,sans-serif; background:#fff; }
    a { color:inherit; text-decoration:none; }
    .shell { min-height:100vh; display:grid; grid-template-columns:minmax(0,1fr) 46vw; }
    .form-side { display:grid; align-content:center; padding:56px 8vw; }
    .logo img { width:190px; height:auto; display:block; margin-bottom:54px; }
    .eyebrow { color:var(--navy); font-size:13px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:14px 0 30px; font-size:clamp(36px,5vw,64px); line-height:1.1; }
    .panel { max-width:460px; }
    label { display:grid; gap:8px; margin-bottom:16px; color:var(--muted); font-size:13px; font-weight:900; }
    input { width:100%; border:1px solid var(--line); border-radius:6px; padding:14px 13px; font:inherit; color:var(--ink); background:#fff; }
    .button { display:flex; align-items:center; justify-content:center; width:100%; min-height:52px; border-radius:6px; border:0; background:var(--blue); color:#fff; font-weight:900; font-size:15px; margin-top:22px; }
    .sub { display:flex; justify-content:space-between; gap:16px; margin-top:18px; color:var(--navy); font-size:13px; font-weight:800; }
    .visual { background:linear-gradient(90deg,rgba(6,27,53,.86),rgba(6,27,53,.34)), url("assets/science-evidence-practice-bg.png") center/cover no-repeat; position:relative; }
    .visual-card { position:absolute; left:40px; right:40px; bottom:40px; padding:26px; border-radius:8px; background:rgba(255,255,255,.9); box-shadow:0 24px 70px rgba(0,0,0,.18); }
    .visual-card strong { display:block; color:var(--navy); font-size:20px; margin-bottom:8px; }
    .visual-card p { margin:0; color:var(--muted); line-height:1.8; font-size:14px; }
    @media (max-width:900px){ .shell{grid-template-columns:1fr;} .visual{display:none;} .form-side{padding:40px 24px;} }
  </style>
</head>
<body>
  <main class="shell">
    <section class="form-side">
      <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
      <div class="panel">
        <span class="eyebrow">Login</span>
        <h1>ログイン</h1>
        <label>メールアドレス
          <input type="email" placeholder="name@example.com">
        </label>
        <label>パスワード
          <input type="password" placeholder="••••••••">
        </label>
        <a class="button" href="mypage.html">ログインする</a>
        <div class="sub">
          <a href="auth-register.html">新規登録</a>
          <a href="#">パスワードを忘れた方</a>
        </div>
      </div>
    </section>
    <section class="visual">
      <div class="visual-card">
        <strong>申込履歴と購入動画を一つの場所に。</strong>
        <p>ログイン後、参加予定のセミナー、購入済みアーカイブ、視聴期限を確認できます。</p>
      </div>
    </section>
  </main>
</body>
</html>
