<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>申込フォーム | Rewalk</title><link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <style>
    :root{--navy:#1A4B8C;--blue:#2563EB;--ink:#1A1A2E;--muted:#667085;--line:#DCE6F5;--pale:#F0F5FF;--dark:#061b35;--green:#128C7E}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:"Noto Sans JP","Inter",system-ui,sans-serif;background:linear-gradient(180deg,var(--pale),#fff 360px)}a{text-decoration:none;color:inherit}.nav{display:flex;justify-content:space-between;align-items:center;padding:22px 5vw;background:#fff;border-bottom:1px solid var(--line)}.logo img{width:176px}.links{display:flex;gap:26px;font-weight:900;font-size:14px}.page{max-width:1120px;margin:0 auto;padding:64px 24px 96px;display:grid;grid-template-columns:1fr 360px;gap:28px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}.head{padding:24px;border-bottom:1px solid var(--line)}.eyebrow{color:var(--navy);font-weight:900;font-size:13px;letter-spacing:.08em;text-transform:uppercase}h1{margin:10px 0 0;font-size:44px;line-height:1.15}.body{padding:24px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}label{display:grid;gap:8px;color:var(--muted);font-size:13px;font-weight:900}input,select,textarea{border:1px solid var(--line);border-radius:6px;padding:13px;font:inherit}.full{grid-column:1/-1}.coupon{margin-top:18px;padding:18px;border:1px solid rgba(18,140,126,.24);border-radius:8px;background:#F3FFFC}.coupon-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.coupon-head strong{color:var(--green)}.coupon-head span{font-size:12px;color:var(--muted);font-weight:900}.coupon-row{display:grid;grid-template-columns:1fr 96px;gap:10px}.coupon-button{border:0;border-radius:6px;background:var(--green);color:#fff;font:inherit;font-weight:900}.coupon-note{margin:10px 0 0;color:var(--muted);font-size:13px;line-height:1.7}.button{display:flex;justify-content:center;align-items:center;min-height:52px;margin-top:22px;border-radius:6px;background:var(--blue);color:#fff;font-weight:900}.summary-img{aspect-ratio:16/10;background:linear-gradient(rgba(6,27,53,.08),rgba(6,27,53,.28)),url("assets/seminar-gait-analysis.png") center/cover no-repeat}.summary{padding:22px}.summary h2{margin:0 0 14px}.summary p{margin:0 0 10px;color:var(--muted);line-height:1.8}.price{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);font-weight:900;font-size:22px}.price-row{display:flex;justify-content:space-between;gap:12px;margin:8px 0;color:var(--muted);font-size:14px}.price-row.discount{color:var(--green);font-weight:900}.total{display:flex;justify-content:space-between;gap:12px;margin-top:12px;padding-top:14px;border-top:1px solid var(--line);font-size:24px;color:var(--ink)}@media(max-width:900px){.page,.grid,.coupon-row{grid-template-columns:1fr}.links{gap:14px;font-size:12px}}
  </style>
</head>
<body>
  <header class="nav"><a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a><nav class="links"><a href="index.html">セミナー</a><a href="mypage.html">マイページ</a></nav></header>
  <main class="page">
    <section class="panel"><div class="head"><span class="eyebrow">Apply</span><h1>申込フォーム</h1></div><div class="body"><div class="grid"><label>氏名<input value="田村 翔太郎"></label><label>メールアドレス<input value="shotaro@example.com"></label><label>所属<input placeholder="所属施設・事業所"></label><label>職種<select><option>理学療法士</option><option>作業療法士</option><option>言語聴覚士</option><option>その他</option></select></label><label class="full">備考<textarea placeholder="領収書宛名など"></textarea></label></div><div class="coupon"><div class="coupon-head"><strong>LINEクーポン</strong><span>任意</span></div><div class="coupon-row"><input value="LINE2026" aria-label="クーポンコード"><button class="coupon-button" type="button">適用</button></div><p class="coupon-note">公式LINEで配布されたコードを入力すると、対象セミナーの割引が決済金額に反映されます。</p></div><a class="button" href="payment-success.html">Stripe Checkoutへ進む</a></div></section>
    <aside class="panel"><div class="summary-img"></div><div class="summary"><h2>歩行分析の再構成</h2><p>2026.06.22（日）20:00</p><p>オンライン / Zoom</p><p>残席 12</p><div class="price"><div class="price-row"><span>通常価格</span><span>¥4,500</span></div><div class="price-row discount"><span>LINEクーポン</span><span>-¥1,000</span></div><div class="total"><span>合計</span><span>¥3,500</span></div></div></div></aside>
  </main>
</body>
</html>
