<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規登録 | Rewalk</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <style>
    :root { --navy:#1A4B8C; --blue:#2563EB; --green:#128C7E; --ink:#1A1A2E; --muted:#667085; --line:#DCE6F5; --pale:#F0F5FF; --dark:#061b35; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); font-family:"Noto Sans JP","Inter",system-ui,sans-serif; background:linear-gradient(180deg,var(--pale),#fff 360px); }
    a { color:inherit; text-decoration:none; }
    .nav { display:flex; justify-content:space-between; align-items:center; padding:22px 5vw; background:rgba(255,255,255,.94); border-bottom:1px solid var(--line); }
    .logo img { width:176px; display:block; height:auto; }
    .nav a:last-child { color:var(--navy); font-weight:900; font-size:14px; }
    .wrap { max-width:1040px; margin:0 auto; padding:72px 24px 96px; display:grid; grid-template-columns:.8fr 1.2fr; gap:34px; align-items:start; }
    .intro { padding-top:18px; }
    .eyebrow { color:var(--navy); font-size:13px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:14px 0 18px; font-size:clamp(34px,5vw,64px); line-height:1.1; }
    .intro p { color:var(--muted); line-height:1.9; font-weight:600; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:8px; padding:28px; box-shadow:0 24px 70px rgba(26,75,140,.08); }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:13px; font-weight:900; }
    input, select { width:100%; border:1px solid var(--line); border-radius:6px; padding:13px; font:inherit; color:var(--ink); background:#fff; }
    .full { grid-column:1 / -1; }
    .button { display:flex; align-items:center; justify-content:center; min-height:52px; margin-top:22px; border-radius:6px; background:var(--blue); color:#fff; font-weight:900; }
    .line-box { margin-top:18px; padding:16px; border:1px solid rgba(18,140,126,.24); border-radius:8px; background:#F3FFFC; }
    .line-box strong { display:block; color:var(--green); margin-bottom:6px; }
    .line-box p { margin:0; color:var(--muted); font-size:13px; line-height:1.7; }
    .note { margin-top:14px; color:var(--muted); font-size:12px; line-height:1.7; }
    @media (max-width:900px){ .wrap,.grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
    <a href="auth-login.html">ログイン</a>
  </header>
  <main class="wrap">
    <section class="intro">
      <span class="eyebrow">Register</span>
      <h1>新規登録</h1>
      <p>セミナー申込、購入済みアーカイブの視聴、申込履歴の確認に利用します。</p>
    </section>
    <section class="panel">
      <div class="grid">
        <label>氏名<input placeholder="田村 翔太郎"></label>
        <label>メールアドレス<input type="email" placeholder="name@example.com"></label>
        <label>所属<input placeholder="所属施設・事業所"></label>
        <label>職種<select><option>理学療法士</option><option>作業療法士</option><option>言語聴覚士</option><option>医師</option><option>その他</option></select></label>
        <label class="full">パスワード<input type="password" placeholder="8文字以上"></label>
      </div>
      <div class="line-box">
        <strong>公式LINE登録でクーポンを受け取れます</strong>
        <p>登録後の案内メールから公式LINEへ進むと、対象セミナーで使えるクーポンコードを受け取れます。</p>
      </div>
      <a class="button" href="mypage.html">登録して進む</a>
      <p class="note">登録後、申込確認や視聴案内のメールを送信します。送信や削除ではありません。まだモックです、落ち着いてください。</p>
    </section>
  </main>
</body>
</html>
