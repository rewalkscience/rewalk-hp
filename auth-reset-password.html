<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新しいパスワードの設定 | Rewalk</title>
  <meta name="description" content="Rewalkアカウントの新しいパスワードを設定します。">
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --white: #FFFFFF;
      --radius-card: 16px;
      --radius-ui: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, sans-serif;
      background: #fff;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    .shell { min-height: 100vh; display: grid; place-items: center; padding: 40px 20px; }
    .logo img { width: 176px; height: auto; display: block; margin: 0 auto 40px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--navy); }
    h1 { margin: 14px 0 12px; font-size: clamp(28px,5vw,42px); line-height: 1.1; letter-spacing: -0.015em; font-weight: 800; }
    p.desc { margin: 0 0 28px; color: var(--muted); line-height: 1.8; font-size: 14px; }
    .panel { max-width: 460px; width: 100%; }
    label { display: grid; gap: 8px; margin-bottom: 16px; color: var(--muted); font-size: 13px; font-weight: 600; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      padding: 14px 13px;
      font: inherit;
      color: var(--ink);
      background: #fff;
      outline: none;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: var(--radius-ui);
      border: 0;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      margin-top: 8px;
      cursor: pointer;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,.35); }
    .button:disabled { opacity: .6; cursor: default; transform: none; box-shadow: none; }
    .sub { margin-top: 18px; color: var(--navy); font-size: 13px; font-weight: 600; text-align: center; }
    .sub a:hover { color: var(--blue); }
    #result { display: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="shell">
    <div class="panel">
      <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
      <span class="eyebrow">Reset Password</span>
      <h1>新しいパスワードの設定</h1>
      <p class="desc">新しいパスワードを入力してください。</p>
      <div id="result"></div>
      <form id="reset-form">
        <label>新しいパスワード（8〜128文字）
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
        </label>
        <label>新しいパスワード（確認）
          <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
        </label>
        <button type="button" class="button" id="submit-btn" onclick="submitReset()">パスワードを更新する</button>
      </form>
      <div class="sub"><a href="auth-login.html">ログインに戻る</a></div>
    </div>
  </main>
  <script src="assets/js/api.js?v=2"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token')
    const result = document.getElementById('result')
    if (!token) {
      document.getElementById('reset-form').style.display = 'none'
      result.textContent = '無効なリンクです。パスワード再設定を最初からやり直してください。'
      result.style.display = 'block'
      result.style.background = '#FEF2F2'
      result.style.color = '#B91C1C'
      result.style.border = '1px solid #FECACA'
    }

    async function submitReset() {
      const password = document.getElementById('password').value
      const password2 = document.getElementById('password2').value
      if (password.length < 8) { showError('パスワードは8文字以上にしてください'); return }
      if (password !== password2) { showError('パスワードが一致しません'); return }

      const btn = document.getElementById('submit-btn')
      btn.disabled = true
      btn.textContent = '更新中...'
      try {
        const res = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        })
        const data = await res.json()
        if (!res.ok) { showError(data.error || '更新に失敗しました'); btn.disabled = false; btn.textContent = 'パスワードを更新する'; return }
        document.getElementById('reset-form').style.display = 'none'
        result.textContent = 'パスワードを更新しました。新しいパスワードでログインしてください。'
        result.style.display = 'block'
        result.style.background = '#F0FDF4'
        result.style.color = '#15803D'
        result.style.border = '1px solid #BBF7D0'
      } catch {
        showError('通信エラーが発生しました。時間をおいて再試行してください。')
        btn.disabled = false
        btn.textContent = 'パスワードを更新する'
      }
    }

    function showError(msg) {
      result.textContent = msg
      result.style.display = 'block'
      result.style.background = '#FEF2F2'
      result.style.color = '#B91C1C'
      result.style.border = '1px solid #FECACA'
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') submitReset() })
  </script>
</body>
</html>
