<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面のセミナー管理。公開中・非公開セミナーの一覧確認・新規作成・編集ができます。">
  <meta name="robots" content="noindex">
  <title>セミナー管理 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: #F1F5FB;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { text-decoration: none; color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      min-height: 100vh;
    }
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    .main { padding: 36px 40px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 20px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-weight: 700;
      font-size: 13.5px;
      transition: all .2s ease;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
    }
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,.38);
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    tbody td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }
    tbody tr:last-child td { border-bottom: none; }
    .edit {
      color: var(--blue);
      font-weight: 700;
      font-size: 13px;
      transition: color .2s ease;
    }
    .edit:hover { color: var(--blue-deep); }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a class="active" href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-users.html">会員一覧</a>
        <a href="admin-coupons.html">クーポン管理</a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <h1>セミナー管理</h1>
        <a class="button" href="admin-seminar-edit.html">新規作成</a>
      </div>
      <section class="panel">
        <table>
          <thead>
            <tr>
              <th scope="col">タイトル</th>
              <th scope="col">開催日時</th>
              <th scope="col">形式</th>
              <th scope="col">価格</th>
              <th scope="col">申込</th>
              <th scope="col">公開</th>
              <th scope="col"></th>
            </tr>
          </thead>
          <tbody id="seminar-tbody">
            <tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:32px">読み込み中…</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    const API = API_BASE
    const token = localStorage.getItem('rw_token')
    if (!token || localStorage.getItem('rw_role') !== 'admin') location.href = 'auth-login.html'

    const STATUS_LABEL = { draft: '下書き', published: '公開中', closed: '終了' }
    const FORMAT_LABEL = { online: 'オンライン', offline: '対面' }

    async function load() {
      const res = await fetch(`${API}/admin/seminars`, { headers: { Authorization: `Bearer ${token}` } })
      if (res.status === 401) { location.href = 'auth-login.html'; return }
      const seminars = await res.json()
      const tbody = document.getElementById('seminar-tbody')
      if (!seminars.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:32px">セミナーがまだありません</td></tr>'
        return
      }
      tbody.innerHTML = seminars.map(s => `
        <tr>
          <td><strong>${s.title}</strong></td>
          <td>${s.date.slice(0,10).replace(/-/g,'.')}</td>
          <td>${FORMAT_LABEL[s.format] || s.format}</td>
          <td>¥${s.price.toLocaleString()}</td>
          <td>${s.enrolled_count} / ${s.capacity}</td>
          <td><span style="color:${s.status==='published'?'#16a34a':s.status==='draft'?'#64748b':'#dc2626'}">${STATUS_LABEL[s.status]||s.status}</span></td>
          <td>
            <a class="edit" href="admin-seminar-edit.html?id=${s.id}">編集</a>
            <button onclick="deleteSeminar('${s.id}','${s.title}')" style="margin-left:8px;color:#dc2626;background:none;border:none;cursor:pointer;font-size:13px;">削除</button>
          </td>
        </tr>`).join('')
    }

    async function deleteSeminar(id, title) {
      if (!confirm(`「${title}」を削除しますか？\n申込済みユーザーがいる場合は削除できません。`)) return
      const res = await fetch(`${API}/admin/seminars/${id}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
      })
      const data = await res.json()
      if (!res.ok) { alert(data.error || '削除に失敗しました'); return }
      load()
    }

    load()
  </script>
</body>
</html>
