<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>メールアドレス変更の確認 | Rewalk</title>
  <meta name="description" content="Rewalkアカウントのメールアドレス変更を確定します。">
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --white: #FFFFFF;
      --radius-card: 16px;
      --radius-ui: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, sans-serif;
      background: #fff;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    .shell { min-height: 100vh; display: grid; place-items: center; padding: 40px 20px; }
    .logo img { width: 176px; height: auto; display: block; margin: 0 auto 40px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--navy); }
    h1 { margin: 14px 0 12px; font-size: clamp(28px,5vw,42px); line-height: 1.1; letter-spacing: -0.015em; font-weight: 800; }
    .panel { max-width: 460px; width: 100%; }
    .sub { margin-top: 18px; color: var(--navy); font-size: 13px; font-weight: 600; text-align: center; }
    .sub a:hover { color: var(--blue); }
    #result { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 20px; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="shell">
    <div class="panel">
      <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
      <span class="eyebrow">Confirm Email</span>
      <h1>メールアドレス変更の確認</h1>
      <div id="result" style="background:var(--line);color:var(--muted);">確認中...</div>
      <div class="sub"><a href="auth-login.html">ログインへ</a></div>
    </div>
  </main>
  <script src="assets/js/api.js?v=2"></script>
  <script>
    const result = document.getElementById('result')
    const token = new URLSearchParams(location.search).get('token')

    function show(msg, ok) {
      result.textContent = msg
      result.style.background = ok ? '#F0FDF4' : '#FEF2F2'
      result.style.color = ok ? '#15803D' : '#B91C1C'
      result.style.border = ok ? '1px solid #BBF7D0' : '1px solid #FECACA'
    }

    async function confirm() {
      if (!token) { show('無効なリンクです。メールアドレス変更を最初からやり直してください。', false); return }
      try {
        const res = await fetch(`${API_BASE}/auth/confirm-email-change`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        })
        const data = await res.json()
        if (!res.ok) { show(data.error || '変更に失敗しました', false); return }
        show('メールアドレスを変更しました。次回から新しいメールアドレスでログインしてください。', true)
      } catch {
        show('通信エラーが発生しました。時間をおいて再度リンクを開いてください。', false)
      }
    }
    confirm()
  </script>
</body>
</html>
