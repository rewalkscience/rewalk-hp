<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>セミナー一覧 | Rewalk</title>
  <meta name="description" content="Rewalk Seminarsのセミナー一覧。歩行分析・神経変性疾患・介入設計など、歩行再建に関わる医療専門職のための実践セミナーを開催しています。">
  <meta property="og:title" content="セミナー一覧 | Rewalk">
  <meta property="og:description" content="Rewalk Seminarsのセミナー一覧。歩行再建に関わる医療専門職のための実践セミナーを開催しています。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      background: #fff;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    html, body { overflow-x: hidden; overflow-x: clip; max-width: 100%; }
    img { max-width: 100%; height: auto; }
    /* ナビ */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5vw;
      border-bottom: 1px solid var(--line-soft);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(16px) saturate(1.4);
      z-index: 10;
    }
    .logo { display: inline-flex; align-items: center; }
    .logo img { display: block; width: 176px; height: auto; }
    .links {
      display: flex;
      gap: 28px;
      font-size: 14px;
      font-weight: 600;
      align-items: center;
    }
    .links a:hover { color: var(--blue); }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
      transition: all .2s ease;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    /* ハンバーガー */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all .2s ease;
    }
    #menu-toggle { display: none; }
    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      z-index: 19;
      max-height: calc(100vh - 68px);
      overflow-y: auto;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-soft);
      padding: 8px 5vw 16px;
    }
    .line-banner { display: block; margin: 0 0 32px; }
    .line-banner picture, .line-banner img { width: 100%; height: auto; border-radius: 16px; display: block; }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 15px;
      font-weight: 600;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    #menu-toggle:checked ~ .mobile-menu { display: flex; }
    /* ページ */
    .page {
      padding: 72px 5vw 96px;
      background: linear-gradient(180deg, var(--pale), #fff 360px);
    }
    .title {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      align-items: end;
      margin-bottom: 48px;
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 5vw, 72px);
      line-height: 1.12;
      letter-spacing: -0.015em;
      font-weight: 800;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
      font-weight: 500;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 32px;
      align-items: start;
    }
    /* フィルターサイドバー */
    .filters {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      padding: 22px;
      background: #fff;
      position: sticky;
      top: 88px;
      box-shadow: var(--shadow-card);
    }
    .filters h2 {
      margin: 0 0 18px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .chip {
      display: block;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-ui);
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 14px;
      background: #fff;
      transition: all .2s ease;
    }
    .chip:hover { background: var(--pale); border-color: var(--line); }
    .chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    /* カードグリッド */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }
    .card {
      min-width: 0;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-card);
      transition: all .2s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); }
    .image {
      aspect-ratio: 16/9;
      background: linear-gradient(rgba(8,28,56,.08), rgba(8,28,56,.24)), url("assets/seminar-gait-analysis.png") center/cover no-repeat;
    }
    .image.ref { background-image: linear-gradient(rgba(8,28,56,.04), rgba(8,28,56,.15)), url("assets/afo-reference.png"); }
    .image.orthosis { background-image: linear-gradient(rgba(8,28,56,.04), rgba(8,28,56,.18)), url("assets/science-workshop.png"); }
    .image.archive { background-image: linear-gradient(rgba(8,28,56,.04), rgba(8,28,56,.18)), url("assets/archive-clinical-reasoning.png"); }
    .body { padding: 24px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-open { background: #E7F8EF; color: #15803D; }
    .status-upcoming { background: #EFF4FF; color: var(--blue-deep); }
    .status-closed { background: var(--pale); color: var(--muted); }
    h3 {
      margin: 0 0 14px;
      font-size: 22px;
      line-height: 1.4;
      letter-spacing: -0.015em;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      line-height: 1.9;
      margin: 0 0 22px;
      font-size: 14px;
    }
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--line-soft);
      padding-top: 18px;
      font-weight: 700;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      transition: all .2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.4); }
    .actions { display: flex; align-items: center; gap: 8px; }
    .share-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #000;
      transition: opacity .2s ease;
    }
    .share-x:hover { opacity: .75; }
    .share-x svg { width: 14px; height: 14px; fill: #fff; }
    @media (max-width: 768px) {
      .nav { padding: 12px 20px; }
      .logo img { width: 110px; }
      .links { display: none; }
      .hamburger { display: flex; }
      .title, .layout, .grid { grid-template-columns: 1fr; }
      .filters { position: static; }
      .page { padding: 48px 20px 72px; }
    }
    @media (min-width: 769px) and (max-width: 900px) {
      .links { gap: 14px; font-size: 12px; }
      .page { padding: 48px 24px 72px; }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="menu-toggle" aria-hidden="true">
  <header class="nav">
    <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
    <nav class="links">
      <a href="index.html">セミナー</a>
      <a href="seminars.html">一覧</a>
      <a href="science.html">Rewalk Science</a>
      <a href="auth-login.html">ログイン</a>
      <a class="nav-cta" href="seminars.html">セミナーを探す</a>
    </nav>
    <label class="hamburger" for="menu-toggle" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </label>
  </header>
  <nav class="mobile-menu">
    <a href="index.html">セミナー</a>
    <a href="seminars.html">一覧</a>
    <a href="science.html">Rewalk Science</a>
    <a href="auth-login.html">ログイン</a>
    <a href="seminars.html">セミナーを探す</a>
  </nav>
  <main class="page">
    <div class="title">
      <h1>セミナー一覧</h1>
      <p class="lead">歩行再建の評価・介入・疾患理解を、現場に持ち帰れる形で学ぶ実践セミナーです。</p>
    </div>
    <div class="layout">
      <aside class="filters">
        <h2>絞り込み</h2>
        <a class="chip active" href="#">すべて</a>
        <a class="chip" href="#">オンライン</a>
        <a class="chip" href="#">対面</a>
      </aside>
      <div>
        <a class="line-banner" href="https://rewalk-official-line.rewalk-science.workers.dev/auth/line?ref=hp" target="_blank" rel="noopener">
          <picture>
            <source media="(max-width: 640px)" srcset="assets/line/smaho_line_banner_2.png">
            <img src="assets/line-coupon-banner.png" alt="公式LINE登録でクーポン発行 最大20%OFF 友だち追加して受け取る">
          </picture>
        </a>
        <h2 style="font-size:20px;font-weight:700;margin:0 0 18px;">申し込み期間中</h2>
        <section class="grid" id="seminar-grid-open" style="margin-bottom:48px;">
          <p style="color:var(--muted)">読み込み中...</p>
        </section>
        <h2 style="font-size:20px;font-weight:700;margin:0 0 18px;">開催予定</h2>
        <section class="grid" id="seminar-grid-upcoming">
          <p style="color:var(--muted)"></p>
        </section>
      </div>
    </div>
  </main>
  <script src="assets/js/api.js?v=2"></script>
  <script>
    const IMAGE_CLASSES = ['ref', 'orthosis', 'archive']

    function isEnrollmentOpen(s) {
      const now = Date.now()
      if (s.enrollment_start && now < new Date(s.enrollment_start).getTime()) return false
      if (s.enrollment_end && now > new Date(s.enrollment_end).getTime()) return false
      return true
    }

    function enrollmentStatus(s) {
      const now = Date.now()
      if (s.enrollment_start && now < new Date(s.enrollment_start).getTime()) {
        const d = new Date(s.enrollment_start)
        return { cls: 'status-upcoming', text: `${d.getMonth() + 1}/${d.getDate()} 申し込み受付開始` }
      }
      if (s.enrollment_end && now > new Date(s.enrollment_end).getTime()) {
        return { cls: 'status-closed', text: '申し込み受付終了' }
      }
      return { cls: 'status-open', text: '申し込み受付中' }
    }

    function renderCard(s, i) {
      const seats = rwSeatsLabel(s)
      const status = enrollmentStatus(s)
      const img = s.thumbnail_url
        ? `<div class="image" style="background-image:url('${rwEscape(s.thumbnail_url)}');background-size:contain;background-position:center;background-repeat:no-repeat;background-color:#EDF2F9"></div>`
        : `<div class="image ${IMAGE_CLASSES[i % IMAGE_CLASSES.length]}"></div>`
      const detailHref = `seminar-detail.html?id=${encodeURIComponent(s.id)}`
      return `
    <article class="card">
      <a href="${detailHref}" aria-label="${rwEscape(s.title)} の詳細へ">${img}</a>
      <div class="body">
        <div class="topline"><span>${rwEscape(rwFormatSeminarDates(s))}</span><span class="badge">${s.format === 'offline' ? '対面' : s.format === 'hybrid' ? 'ハイブリッド' : 'オンライン'}</span></div>
        <div class="status-badge ${status.cls}" style="margin-bottom:14px;">${status.text}</div>
        <h3><a href="${detailHref}" style="color:inherit;">${rwEscape(s.title)}</a></h3>
        <p class="meta">${rwEscape(rwStripHtml(s.description).slice(0, 80))}</p>
        <div class="bottom">
          <span>${rwFormatPrice(s.price)}${seats ? ` / ${seats}` : ''}</span>
          <div class="actions">
            <a class="share-x" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(`${s.title}（${rwFormatDate(s.date)}）| Rewalk Science`)}&url=${encodeURIComponent(location.origin + location.pathname.replace(/[^/]*$/, '') + 'seminar-detail.html?id=' + encodeURIComponent(s.id))}" target="_blank" rel="noopener" aria-label="Xでシェア">
              <svg viewBox="0 0 24 24"><path d="M18.9 2H22l-7.6 8.7L23.4 22h-7l-5.5-7.2L4.6 22H1.5l8.1-9.3L1 2h7.2l5 6.6L18.9 2zm-1.2 18h1.7L7.4 3.9H5.6L17.7 20z"/></svg>
            </a>
            <a class="button" href="seminar-detail.html?id=${encodeURIComponent(s.id)}">詳細・申込</a>
          </div>
        </div>
      </div>
    </article>`
    }

    async function loadSeminars() {
      const gridOpen = document.getElementById('seminar-grid-open')
      const gridUpcoming = document.getElementById('seminar-grid-upcoming')
      try {
        const seminars = await apiFetch('/seminars', { redirectOn401: false })
        if (!seminars || seminars.length === 0) {
          gridOpen.innerHTML = '<p style="color:var(--muted)">現在募集中のセミナーはありません。公開までお待ちください。</p>'
          gridUpcoming.innerHTML = ''
          return
        }
        const open = seminars.filter(isEnrollmentOpen)
        const upcoming = seminars.filter(s => !isEnrollmentOpen(s))

        gridOpen.innerHTML = open.length
          ? open.map(renderCard).join('')
          : '<p style="color:var(--muted)">現在申込受付中のセミナーはありません。</p>'
        gridUpcoming.innerHTML = upcoming.length
          ? upcoming.map(renderCard).join('')
          : '<p style="color:var(--muted)">開催予定のセミナーはありません。</p>'
      } catch (e) {
        gridOpen.innerHTML = `<p style="color:var(--muted)">セミナー情報の取得に失敗しました。時間をおいて再読み込みしてください。</p>`
        gridUpcoming.innerHTML = ''
      }
    }
    loadSeminars()
  </script>
</body>
</html>
