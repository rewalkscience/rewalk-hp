<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rewalk Seminars | 歩行再建の実践セミナー</title>
  <meta name="description" content="歩行再建の評価・介入・疾患理解を現場に持ち帰れる形で学ぶ。Rewalk Seminarsは理学療法士・作業療法士のための実践セミナーです。">
  <meta property="og:title" content="Rewalk Seminars | 歩行再建の実践セミナー">
  <meta property="og:description" content="歩行再建の評価・介入・疾患理解を現場に持ち帰れる形で学ぶ。Rewalk Seminarsは理学療法士・作業療法士のための実践セミナーです。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      letter-spacing: 0;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    /* ナビ */
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 5vw;
      background: rgba(255,255,255,.85);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(16px) saturate(1.4);
    }
    .logo {
      display: inline-flex;
      align-items: center;
    }
    .logo img { display: block; width: 176px; height: auto; }
    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      font-weight: 600;
      font-size: 14px;
    }
    .nav-links a:first-child { color: var(--blue); }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
      transition: all .2s ease;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    /* ハンバーガー */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all .2s ease;
    }
    #menu-toggle { display: none; }
    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-soft);
      padding: 8px 5vw 16px;
    }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 15px;
      font-weight: 600;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    #menu-toggle:checked ~ .mobile-menu { display: flex; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(2) { opacity: 0; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    /* ヒーロー */
    .hero {
      padding: 64px 5vw 96px;
      background: radial-gradient(120% 140% at 80% 0%, #16407c 0%, var(--dark) 55%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,.15);
    }
    .page-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 36px;
      position: relative;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      margin: 10px 0 0;
      font-size: clamp(32px, 8vw, 88px);
      line-height: 1.08;
      letter-spacing: -0.015em;
      font-weight: 800;
      color: #fff;
    }
    .hero-accent-line {
      display: block;
      width: 40px;
      height: 2px;
      margin-bottom: 18px;
      background: var(--accent);
    }
    .hero-title {
      font-family: "Inter", sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
      max-width: 100%;
      overflow-wrap: break-word;
    }
    .hero-title-dot { color: var(--accent); }
    .page-title .link {
      color: rgba(255,255,255,.7);
      font-weight: 600;
      white-space: nowrap;
      font-size: 14px;
    }
    .page-title .link:hover { color: #fff; }
    /* ファインダー */
    .finder {
      margin-bottom: 32px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-card);
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      position: relative;
    }
    .finder-title {
      margin: 0 0 16px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
    }
    .search-bar {
      display: grid;
      grid-template-columns: 160px 1fr 104px;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-bar select,
    .search-bar input {
      min-height: 46px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius-ui);
      padding: 0 14px;
      color: var(--ink);
      font: inherit;
      background: rgba(255,255,255,.92);
      transition: all .2s ease;
    }
    .search-bar select:focus,
    .search-bar input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      outline: none;
    }
    .search-bar button {
      border: 0;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
    }
    .search-bar button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.4); }
    .finder-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 22px;
    }
    .finder-block strong {
      display: block;
      margin-bottom: 10px;
      color: rgba(255,255,255,.65);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.9);
      font-size: 12px;
      font-weight: 600;
      transition: all .2s ease;
    }
    .chip:hover { background: rgba(255,255,255,.22); }
    /* カルーセル — 3D CoverFlow（全幅・画像全体表示） */
    .carousel-wrap {
      --card-w: min(56vw, 680px);
      position: relative;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      perspective: 1100px;
      perspective-origin: 50% 50%;
      overflow: hidden;
      padding: 16px 0 12px;
      margin-bottom: 28px;
    }
    .carousel-track {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(var(--card-w) / 1.9);
      user-select: none;
    }
    /* フィーチャードカード（画像のみ・3D） */
    .featured {
      position: absolute;
      width: var(--card-w);
      height: 100%;
      overflow: hidden;
      border-radius: var(--radius-card);
      background: #081C38;
      cursor: pointer;
      transition: transform .5s cubic-bezier(.25,.46,.45,.94),
                  opacity .5s ease,
                  box-shadow .5s ease;
      will-change: transform, opacity;
    }
    .featured-image {
      position: absolute;
      inset: 0;
      background:
        url("assets/seminar-gait-analysis.png") center / contain no-repeat;
      transition: transform .6s ease;
    }
    .featured:hover .featured-image { transform: scale(1.04); }
    .featured-image.img-workshop {
      background-image: url("assets/science-workshop.png");
    }
    .featured-image.img-reasoning {
      background-image: url("assets/archive-clinical-reasoning.png");
    }
    .featured-image.img-orthosis {
      background-image: url("assets/seminar-orthosis.png");
    }
    .featured-body { display: none; }
    /* 位置別スタイル */
    .featured[data-pos="0"] {
      transform: translateX(0) rotateY(0deg) scale(1);
      z-index: 5;
      opacity: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .featured[data-pos="-1"] {
      transform: translateX(-64%) rotateY(44deg) scale(0.82);
      z-index: 4;
      opacity: 0.72;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }
    .featured[data-pos="1"] {
      transform: translateX(64%) rotateY(-44deg) scale(0.82);
      z-index: 4;
      opacity: 0.72;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }
    .featured[data-pos="-2"] {
      transform: translateX(-98%) rotateY(58deg) scale(0.62);
      z-index: 3;
      opacity: 0.38;
      box-shadow: none;
    }
    .featured[data-pos="2"] {
      transform: translateX(98%) rotateY(-58deg) scale(0.62);
      z-index: 3;
      opacity: 0.38;
      box-shadow: none;
    }
    .featured[data-pos="-3"],
    .featured[data-pos="3"],
    .featured[data-pos="hidden"] {
      transform: translateX(-130%) rotateY(70deg) scale(0.45);
      z-index: 1;
      opacity: 0;
      pointer-events: none;
    }
    .featured[data-pos="3"] {
      transform: translateX(130%) rotateY(-70deg) scale(0.45);
    }
    /* ドットインジケーター */
    .carousel-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.32);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: width .25s ease, background .25s ease;
      flex-shrink: 0;
    }
    .carousel-dot.active {
      width: 22px;
      background: var(--blue);
    }
    @media (max-width: 768px) {
      .carousel-wrap { --card-w: min(82vw, 420px); }
      .featured[data-pos="-1"] { transform: translateX(-68%) rotateY(44deg) scale(0.78); }
      .featured[data-pos="1"]  { transform: translateX(68%)  rotateY(-44deg) scale(0.78); }
    }
    /* LINE友だち追加バナー: スライドショー直下に全画面共通表示 */
    .line-banner {
      display: block;
      margin: 24px 0 0;
    }
    .line-banner picture,
    .line-banner img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
    }
    /* セクション共通 */
    section { padding: 96px 5vw; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      margin-bottom: 36px;
    }
    .section-head .eyebrow { color: var(--navy); }
    .section-head .eyebrow::before { background: var(--navy); }
    .section-head h2 {
      margin: 10px 0 0;
      font-size: clamp(28px, 3.2vw, 44px);
      line-height: 1.25;
      letter-spacing: -0.015em;
      font-weight: 800;
    }
    .link {
      color: var(--navy);
      font-weight: 700;
      white-space: nowrap;
      font-size: 14px;
    }
    .link:hover { color: var(--blue); }
    /* セミナーカードグリッド */
    .seminar-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .seminar {
      display: grid;
      grid-template-rows: 190px 1fr;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-card);
      transition: all .2s ease;
    }
    .seminar:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); }
    .seminar-img {
      background:
        linear-gradient(rgba(8,28,56,.06), rgba(8,28,56,.18)),
        url("assets/seminar-gait-analysis.png") center / cover no-repeat;
    }
    .seminar:nth-child(2) .seminar-img {
      background-image:
        linear-gradient(rgba(8,28,56,.06), rgba(8,28,56,.18)),
        url("assets/science-workshop.png");
    }
    .seminar:nth-child(3) .seminar-img {
      background-image:
        linear-gradient(rgba(8,28,56,.06), rgba(8,28,56,.18)),
        url("assets/archive-clinical-reasoning.png");
    }
    .past .seminar-img {
      filter: grayscale(.15);
    }
    .past .seminar {
      background: #FAFCFF;
    }
    .seminar-body { padding: 24px; }
    .meta {
      margin: 0 0 12px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
    }
    .seminar h3 {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 700;
    }
    .desc {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .price {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
      font-weight: 700;
    }
    .circle {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--line);
      color: var(--navy);
      transition: all .2s ease;
    }
    .circle:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
    /* ボタン */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: var(--radius-ui);
      font-size: 14px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: all .2s ease;
    }
    .button.primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
    }
    .button.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,.4); }
    .button.secondary { border-color: var(--line); background: #fff; color: var(--navy); }
    .button.secondary:hover { background: var(--pale); }
    /* アーカイブセクション */
    .archive {
      background: radial-gradient(120% 140% at 80% 0%, #16407c 0%, var(--dark) 55%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .archive::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .archive .section-head .eyebrow { color: var(--accent); }
    .archive .section-head .eyebrow::before { background: var(--accent); }
    .archive .section-head p { color: rgba(255,255,255,.72); }
    .archive h2 { color: #fff; }
    .archive .link { color: rgba(255,255,255,.7); }
    .archive .link:hover { color: #fff; }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }
    .video {
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: rgba(255,255,255,.04);
      transition: all .2s ease;
    }
    .video:hover { transform: translateY(-3px); background: rgba(255,255,255,.07); }
    .video-img {
      aspect-ratio: 16 / 9;
      position: relative;
      background: url("assets/archive-clinical-reasoning.png") center / cover no-repeat;
    }
    .video:nth-child(2) .video-img { background-image: url("assets/science-workshop.png"); }
    .video:nth-child(3) .video-img { background-image: url("assets/seminar-gait-analysis.png"); }
    .video:nth-child(4) .video-img { background-image: url("assets/closing-gait-motion.png"); }
    .video-img::after {
      content: "▶";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.18);
      color: #fff;
      font-size: 28px;
    }
    .video-body { padding: 18px; }
    .video-body p {
      margin: 0 0 8px;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .video-body h3 {
      margin: 0 0 14px;
      color: #fff;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 700;
    }
    /* フッター */
    .footer {
      padding: 42px 5vw;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      color: var(--muted);
      border-top: 1px solid var(--line-soft);
      font-size: 13px;
    }
    /* レスポンシブ */
    @media (max-width: 768px) {
      .nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .hero { padding: 48px 20px 64px; }
      section { padding: 64px 20px; }
      .page-title { align-items: flex-start; flex-direction: column; }
      .seminar-row,
      .video-grid,
      .finder-grid,
      .search-bar { grid-template-columns: 1fr; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .footer { flex-direction: column; }
    }
    @media (min-width: 769px) and (max-width: 980px) {
      .nav { padding: 18px 24px; }
      .nav-links { gap: 16px; font-size: 13px; }
      .hero, section { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="menu-toggle" aria-hidden="true">
  <header class="nav">
    <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
    <nav class="nav-links">
      <a href="index.html">セミナー</a>
      <a href="seminars.html">一覧</a>
      <a href="science.html">Rewalk Science</a>
      <a href="auth-login.html">ログイン</a>
      <a class="nav-cta" href="seminars.html">セミナーを探す</a>
    </nav>
    <label class="hamburger" for="menu-toggle" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </label>
  </header>
  <nav class="mobile-menu">
    <a href="index.html">セミナー</a>
    <a href="seminars.html">一覧</a>
    <a href="science.html">Rewalk Science</a>
    <a href="auth-login.html">ログイン</a>
    <a href="seminars.html">セミナーを探す</a>
  </nav>

  <main>
    <section class="hero">
      <div class="page-title">
        <div>
          <span class="hero-accent-line"></span>
          <h1 class="hero-title">Rewalk seminar<span class="hero-title-dot">.</span></h1>
        </div>
        <a class="link" href="seminars.html">すべて見る →</a>
      </div>
      <div class="carousel-wrap">
        <div class="carousel-track" id="carousel-track"></div>
        <div class="carousel-dots" id="carousel-dots"></div>

      </div>
      <a class="line-banner" href="https://rewalk-official-line.rewalk-science.workers.dev/auth/line?ref=hp" target="_blank" rel="noopener">
        <picture>
          <source media="(max-width: 640px)" srcset="assets/line/smaho_line_banner.png">
          <img src="assets/line-coupon-banner.png" alt="公式LINE登録でクーポン発行 最大20%OFF 友だち追加して受け取る">

    <script>
    function initCarousel() {
      var track = document.getElementById('carousel-track');
      var dots = document.querySelectorAll('.carousel-dot');
      var slides = Array.from(track.querySelectorAll('.featured'));
      var total = slides.length;
      var current = 0;
      var autoTimer = null;
      var resumeTimer = null;
      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function updatePositions() {
        slides.forEach(function(slide, i) {
          var pos = i - current;
          // ループ: 端をもう片方に折り返す
          if (pos > Math.floor(total / 2))  pos -= total;
          if (pos < -Math.floor(total / 2)) pos += total;
          var key = pos <= -3 ? '-3' : pos >= 3 ? '3' : String(pos);
          slide.dataset.pos = key;
        });
        dots.forEach(function(d, i) {
          d.classList.toggle('active', i === current);
        });
      }

      function goTo(index) {
        current = ((index % total) + total) % total;
        updatePositions();
      }

      function startAuto() {
        if (reducedMotion) return;
        autoTimer = setInterval(function() { goTo(current + 1); }, 4500);
      }
      function stopAuto() { clearInterval(autoTimer); autoTimer = null; }
      function pauseAndResume() {
        stopAuto();
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(startAuto, 8000);
      }

      // ドットクリック
      dots.forEach(function(dot) {
        dot.addEventListener('click', function() {
          goTo(parseInt(dot.dataset.index, 10));
          pauseAndResume();
        });
      });

      // 左右スライドクリックで前後に移動
      slides.forEach(function(slide, i) {
        slide.addEventListener('click', function() {
          var pos = parseInt(slide.dataset.pos, 10);
          if (pos !== 0) { goTo(current + pos); pauseAndResume(); }
        });
      });

      // スワイプ対応
      var startX = 0;
      track.addEventListener('pointerdown', function(e) {
        startX = e.clientX;
        pauseAndResume();
      });
      track.addEventListener('pointerup', function(e) {
        var dx = e.clientX - startX;
        if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
      });

      updatePositions();
      startAuto();
    }
    </script>

  <script>
    const FORMAT_LABEL = f => f === 'offline' ? '対面' : 'オンライン'
    const thumbStyle = u => u ? ` style="background:url('${u}') center/cover no-repeat"` : ''

    async function loadTop() {
      // 開催予定（published・日付昇順）
      let seminars = []
      try { seminars = await apiFetch('/seminars', { redirectOn401: false }) || [] } catch {}

      // カルーセル: 直近4件
      const track = document.getElementById('carousel-track')
      const dotsWrap = document.getElementById('carousel-dots')
      const featured = seminars.slice(0, 4)
      if (featured.length > 0) {
        track.innerHTML = featured.map((s, i) => {
          const remaining = Math.max(0, (s.capacity ?? 0) - (s.enrolled_count ?? 0))
          const badge = i === 0 ? '最も近い開催' : '開催予定'
          return `
          <article class="featured">
            <div class="featured-image"${s.thumbnail_url ? ` style="background:url('${s.thumbnail_url}') center/contain no-repeat"` : ''}></div>
            <div class="featured-body">
              <span class="badge">${badge} / ${FORMAT_LABEL(s.format)}</span>
              <h2>${rwEscape(s.title)}</h2>
              <div class="featured-meta">
                <span>${rwEscape(rwFormatDate(s.date))}</span>
                <span>${s.format === 'offline' ? '会場' : 'Zoom'}</span>
                <span>${remaining > 0 ? `残席 ${remaining}` : '満席'}</span>
              </div>
              <div class="featured-bottom">
                <span>${rwFormatPrice(s.price)}</span>
                <a class="button primary" href="seminar-detail.html?id=${encodeURIComponent(s.id)}">詳細・申込</a>
              </div>
            </div>
          </article>`
        }).join('')
        dotsWrap.innerHTML = featured.map((_, i) =>
          `<button class="carousel-dot${i === 0 ? ' active' : ''}" data-index="${i}" aria-label="スライド${i + 1}"></button>`
        ).join('')
        initCarousel()
      } else {
        track.innerHTML = '<p style="color:var(--muted);padding:24px">現在募集中のセミナーはありません。</p>'
      }

      // 開催予定リスト: 直近3件
      const upcoming = document.getElementById('upcoming-row')
      if (seminars.length === 0) {
        upcoming.innerHTML = '<p style="color:var(--muted)">現在募集中のセミナーはありません。</p>'
      } else {
        upcoming.innerHTML = seminars.slice(0, 3).map(s => `
        <article class="seminar">
          <div class="seminar-img"${thumbStyle(s.thumbnail_url)}></div>
          <div class="seminar-body">
            <p class="meta">${rwEscape(rwFormatDate(s.date))} / ${FORMAT_LABEL(s.format)}</p>
            <h3>${rwEscape(s.title)}</h3>
            <p class="desc">${rwEscape(rwStripHtml(s.description).slice(0, 60))}...</p>
            <div class="price"><span>${rwFormatPrice(s.price)}</span><a class="circle" href="seminar-detail.html?id=${encodeURIComponent(s.id)}">→</a></div>
          </div>
        </article>`).join('')
      }

      // 過去の開催
      const past = document.getElementById('past-row')
      try {
        const closed = await apiFetch('/seminars-past', { redirectOn401: false }) || []
        past.innerHTML = closed.length === 0
          ? '<p style="color:var(--muted)">過去の開催情報は準備中です。</p>'
          : closed.slice(0, 3).map(s => `
        <article class="seminar">
          <div class="seminar-img"${thumbStyle(s.thumbnail_url)}></div>
          <div class="seminar-body">
            <p class="meta">${rwEscape(rwFormatDate(s.date))} / 開催終了</p>
            <h3>${rwEscape(s.title)}</h3>
            <p class="desc">開催済み。アーカイブ配信は準備中です。</p>
            <div class="price"><span>アーカイブ準備中</span><a class="circle" href="seminar-detail.html?id=${encodeURIComponent(s.id)}">→</a></div>
          </div>
        </article>`).join('')
      } catch { past.innerHTML = '<p style="color:var(--muted)">読み込みに失敗しました。</p>' }
    }
    loadTop()
  </script>
