<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>動画視聴 | Rewalk</title>
  <meta name="description" content="Rewalk購入済みアーカイブの視聴ページ。視聴期限内の動画をマイページから確認できます。">
  <meta property="og:title" content="動画視聴 | Rewalk">
  <meta property="og:description" content="Rewalk購入済みアーカイブの視聴ページ。視聴期限内の動画をマイページから確認できます。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      background: #061b35;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; transition: all .2s ease; }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5vw;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid var(--line-soft);
    }
    .logo img { width: 176px; height: auto; display: block; }
    .links {
      display: flex;
      gap: 24px;
      font-weight: 600;
      font-size: 14px;
    }
    .links a:hover { color: var(--blue); }
    .page { padding: 36px 5vw 72px; color: #fff; }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 24px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      margin: 8px 0 0;
      font-size: clamp(24px,4vw,40px);
      font-weight: 800;
      letter-spacing: -0.015em;
      line-height: 1.15;
    }
    .expires {
      color: rgba(255,255,255,.72);
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }
    .player {
      aspect-ratio: 16/9;
      border-radius: var(--radius-card);
      overflow: hidden;
      background: linear-gradient(rgba(7,31,61,.22),rgba(7,31,61,.46)),
                  url("assets/archive-clinical-reasoning.png") center/cover no-repeat;
      display: grid;
      place-items: center;
      font-size: 56px;
      box-shadow: var(--shadow-pop);
      transition: all .2s ease;
    }
    .player:hover { box-shadow: 0 32px 80px -16px rgba(11,31,61,.5); }
    .note {
      margin-top: 18px;
      color: rgba(255,255,255,.72);
      line-height: 1.8;
      font-size: 14px;
    }
    @media (max-width:900px) {
      .head { align-items: flex-start; flex-direction: column; }
      .links { gap: 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
    <nav class="links">
      <a href="mypage.html">マイページ</a>
    </nav>
  </header>
  <main class="page">
    <div class="head">
      <div>
        <span class="eyebrow">Purchased Video</span>
        <h1 id="v-title">読み込み中...</h1>
      </div>
    </div>
    <section class="player" id="v-player">&#9654;</section>
    <div id="v-tabs" style="display:none;margin-top:16px;gap:8px;flex-wrap:wrap;"></div>
    <div id="v-materials" style="display:none;margin-top:22px;"></div>
    <p class="note" id="v-note">購入済みの動画のみ視聴できます。</p>
  </main>
  <script src="assets/js/api.js?v=2"></script>
  <script>
    // YouTube / Google Drive URLを埋め込みプレビューURLに変換
    function toEmbedUrl(url) {
      const yt = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([\w-]+)/)
      if (yt) return `https://www.youtube.com/embed/${yt[1]}`
      const drive = url.match(/drive\.google\.com\/file\/d\/([^/]+)/)
      if (drive) return `https://drive.google.com/file/d/${drive[1]}/preview`
      return url
    }

    async function init() {
      const id = new URLSearchParams(location.search).get('id')
      if (!id) { location.href = 'mypage.html'; return }
      if (!requireAuth()) return
      try {
        const a = await apiFetch(`/seminars/${encodeURIComponent(id)}/archive`)
        document.title = `${a.title} | Rewalk`
        document.getElementById('v-title').textContent = a.title

        // 動画一覧（メイン＋追加分）。2本以上ある場合は切り替えタブを表示
        const videos = (a.videos && a.videos.length ? a.videos : [{ label: null, url: a.video_url }]).filter(v => v.url)
        const showVideo = (i) => {
          document.getElementById('v-player').innerHTML =
            `<iframe src="${rwEscape(toEmbedUrl(videos[i].url))}" style="width:100%;height:100%;border:0" allow="autoplay; fullscreen" allowfullscreen></iframe>`
          document.querySelectorAll('#v-tabs button').forEach((b, j) => {
            b.style.background = j === i ? '#38BDF8' : 'rgba(255,255,255,.1)'
            b.style.color = j === i ? '#0B1F3D' : '#fff'
          })
        }
        if (videos.length > 1) {
          const tabs = document.getElementById('v-tabs')
          tabs.style.display = 'flex'
          tabs.innerHTML = videos.map((v, i) =>
            `<button type="button" data-i="${i}" style="border:none;border-radius:999px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;">${rwEscape(v.label || `動画${i + 1}`)}</button>`
          ).join('')
          tabs.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-i]')
            if (btn) showVideo(Number(btn.dataset.i))
          })
        }
        showVideo(0)

        // 配布資料（Googleドライブリンク等。申込者のみ）
        const materials = a.materials || []
        if (materials.length) {
          const box = document.getElementById('v-materials')
          box.style.display = 'block'
          box.innerHTML = `<h2 style="margin:0 0 12px;font-size:16px;color:#fff;">配布資料</h2>` +
            materials.map(m =>
              `<a href="${rwEscape(m.url)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:13px 16px;margin-bottom:8px;border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-weight:600;font-size:14px;">📄 ${rwEscape(m.label || '資料')} <span style="margin-left:auto;color:#38BDF8;font-size:12px;">開く →</span></a>`
            ).join('')
        }

        document.getElementById('v-note').textContent = a.expires_at
          ? `視聴可能期限: ${rwEscape(a.expires_at.replace('T', ' '))}まで`
          : ''
      } catch (e) {
        document.getElementById('v-title').textContent = '動画が見つかりません'
        document.getElementById('v-note').textContent = e.message || 'このセミナーへの申込が確認できないか、視聴期限が終了しています。'
      }
    }
    init()
  </script>
</body>
</html>
