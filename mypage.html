<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>マイページ | Rewalk</title>
  <meta name="description" content="Rewalkマイページ。申込済みセミナーの確認・購入済みアーカイブの視聴・視聴期限の管理ができます。">
  <meta property="og:title" content="マイページ | Rewalk">
  <meta property="og:description" content="Rewalkマイページ。申込済みセミナーの確認・購入済みアーカイブの視聴・視聴期限の管理ができます。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      background: #F7FAFF;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    /* ナビ */
    #menu-toggle { display: none; }
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 5vw;
      background: rgba(255,255,255,.85);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(16px) saturate(1.4);
    }
    .logo img { width: 176px; display: block; height: auto; }
    .nav-links {
      display: flex;
      gap: 26px;
      align-items: center;
      font-weight: 600;
      font-size: 14px;
    }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
      transition: all .2s ease;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all .2s ease;
    }
    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-soft);
      padding: 8px 5vw 16px;
    }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 15px;
      font-weight: 600;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    #menu-toggle:checked ~ .mobile-menu { display: flex; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(2) { opacity: 0; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    /* ページ */
    .page { padding: 48px 5vw 88px; }
    .title {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      margin-bottom: 28px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--navy);
    }
    h1 {
      margin: 10px 0 0;
      font-size: clamp(36px,5vw,64px);
      line-height: 1.1;
      letter-spacing: -0.015em;
      font-weight: 800;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: start;
    }
    .side, .panel {
      background: #fff;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .side { position: sticky; top: 96px; padding: 18px; }
    .profile {
      padding: 12px 10px 20px;
      border-bottom: 1px solid var(--line-soft);
      margin-bottom: 12px;
    }
    .profile strong { display: block; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .profile span { color: var(--muted); font-size: 13px; }
    .side a {
      display: block;
      padding: 12px 10px;
      border-radius: var(--radius-ui);
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      transition: all .2s ease;
    }
    .side a.active { background: var(--pale); color: var(--navy); }
    .side a:hover { background: var(--pale); color: var(--navy); }
    .main { display: grid; gap: 24px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line-soft);
    }
    .panel-head h2 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.015em; }
    .panel-body { padding: 22px; }
    .search-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 18px 22px;
      background: #fff;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
    }
    .search-input {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      padding: 0 14px;
      font: inherit;
      background: var(--pale);
      transition: all .2s ease;
      outline: none;
    }
    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
      grid-column: 1 / -1;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      background: #fff;
      cursor: pointer;
      transition: all .2s ease;
    }
    .chip.active { border-color: rgba(37,99,235,.28); color: var(--navy); background: var(--pale); }
    .chip:hover { border-color: rgba(37,99,235,.28); color: var(--navy); }
    .benefit {
      display: grid;
      gap: 12px;
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(37,99,235,.2);
      border-radius: var(--radius-card);
      background: linear-gradient(135deg,var(--pale),#fff);
      box-shadow: var(--shadow-card);
    }
    .benefit strong { color: var(--navy); font-size: 16px; font-weight: 700; }
    .benefit p { margin: 0; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .seminar-card {
      display: grid;
      grid-template-columns: 190px 1fr auto;
      gap: 22px;
      align-items: center;
      padding: 18px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-ui);
      margin-bottom: 14px;
      background: #fff;
      transition: all .2s ease;
    }
    .seminar-card:last-child { margin-bottom: 0; }
    .seminar-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); }
    .thumb {
      aspect-ratio: 16/10;
      border-radius: var(--radius-ui);
      background: linear-gradient(rgba(8,28,56,.06),rgba(8,28,56,.18)), url("assets/seminar-gait-analysis.png") center/cover no-repeat;
    }
    .thumb.video {
      background-image: linear-gradient(rgba(8,28,56,.06),rgba(8,28,56,.18)), url("assets/archive-clinical-reasoning.png");
    }
    .meta { margin: 0 0 8px; color: var(--navy); font-size: 13px; font-weight: 600; }
    h3 { margin: 0 0 8px; font-size: 18px; font-weight: 700; letter-spacing: -0.015em; }
    p { margin: 0; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius-ui);
      border: 0;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: all .2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(37,99,235,.32); }
    .ghost {
      background: #fff;
      color: var(--navy);
      border: 1px solid var(--line);
    }
    .ghost:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); box-shadow: none; }
    @media (max-width:900px) {
      .layout, .seminar-card, .search-panel { grid-template-columns: 1fr; }
      .side { position: static; }
      .title { align-items: flex-start; flex-direction: column; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .page { padding: 36px 24px 72px; }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="menu-toggle">
  <nav class="nav">
    <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
    <div class="nav-links">
      <a href="index.html">セミナー</a>
      <a href="seminars.html">一覧</a>
      <a href="science.html">Rewalk Science</a>
      <a class="nav-cta" href="#" onclick="rwLogout();return false">ログアウト</a>
    </div>
    <label class="hamburger" for="menu-toggle" aria-label="メニュー開閉">
      <span></span><span></span><span></span>
    </label>
  </nav>
  <div class="mobile-menu">
    <a href="index.html">セミナー</a>
    <a href="seminars.html">一覧</a>
    <a href="science.html">Rewalk Science</a>
    <a href="auth-login.html">ログアウト</a>
  </div>
  <main class="page">
    <div class="title">
      <div><span class="eyebrow">My Page</span><h1>マイページ</h1></div>
      <a class="button ghost" href="seminars.html">セミナーを探す</a>
    </div>
    <div class="layout">
      <aside class="side">
        <div class="profile">
          <strong id="profile-name">-</strong>
          <span id="profile-email">Rewalk会員</span>
        </div>
        <a class="active" href="#enrollments">申込履歴</a>
        <a href="#videos">アーカイブ動画</a>
        <a href="mypage-account.html">アカウント設定</a>
      </aside>
      <div class="main">
        <section class="benefit">
          <strong>公式LINEでセミナー情報を受け取れます</strong>
          <p>最新のセミナー案内や限定特典は公式LINEで配信しています。</p>
          <a href="https://rewalk-official-line.rewalk-science.workers.dev/auth/line?ref=mypage" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 22px;border-radius:var(--radius-ui);background:#06C755;color:#fff;font-weight:700;font-size:14px;width:fit-content;transition:all .2s ease;">友だち追加する</a>
        </section>
        <section class="panel" id="enrollments">
          <div class="panel-head"><h2>申込済みセミナー</h2><a class="button ghost" href="seminars.html">一覧へ</a></div>
          <div class="panel-body" id="enrollment-list">
            <p style="color:var(--muted)">読み込み中...</p>
          </div>
        </section>
        <section class="panel" id="videos">
          <div class="panel-head"><h2>アーカイブ動画</h2></div>
          <div class="panel-body" id="archive-list">
            <p style="color:var(--muted)">読み込み中...</p>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="assets/js/api.js?v=2"></script>
  <script>
    const STATUS_LABEL = { paid: '申込済み', pending: '決済待ち', cancelled: 'キャンセル' }

    async function init() {
      if (!requireAuth()) return

      const me = await apiFetch('/auth/me')
      document.getElementById('profile-name').textContent = me.name || me.email
      document.getElementById('profile-email').textContent = me.email

      // 申込履歴
      const enrollments = await apiFetch('/my/enrollments')
      const enrollEl = document.getElementById('enrollment-list')
      const active = (enrollments || []).filter(e => e.status !== 'cancelled')
      if (active.length === 0) {
        enrollEl.innerHTML = '<p style="color:var(--muted)">申込済みのセミナーはまだありません。</p>'
      } else {
        enrollEl.innerHTML = active.map(e => `
            <article class="seminar-card">
              <div class="thumb"${e.thumbnail_url ? ` style="background-image:linear-gradient(rgba(8,28,56,.06),rgba(8,28,56,.18)),url('${rwEscape(e.thumbnail_url)}')"` : ''}></div>
              <div>
                <p class="meta">${rwEscape(rwFormatDate(e.date))} / ${e.format === 'offline' ? '対面' : e.format === 'hybrid' ? 'ハイブリッド' : 'オンライン'}</p>
                <h3>${rwEscape(e.title)}</h3>
                <p>${STATUS_LABEL[e.status] || e.status}${e.status === 'paid' ? '。開催前にご案内をお送りします。' : '。決済が完了していません。'}</p>
                ${e.format === 'hybrid' && e.participation_type ? `<p style="color:var(--muted)">参加方法: ${e.participation_type === 'online' ? 'オンライン' : '現地'}</p>` : ''}
              </div>
              <a class="button" href="seminar-detail.html?id=${encodeURIComponent(e.seminar_id)}">詳細を見る</a>
              ${e.status === 'paid' ? `<a class="button" href="receipt.html?id=${encodeURIComponent(e.id)}" style="margin-top:6px;">領収書を発行</a>` : ''}
            </article>`).join('')
      }

      // アーカイブ動画（申込済み・視聴期限内のもの）
      const archives = await apiFetch('/my/archives')
      const archiveEl = document.getElementById('archive-list')
      if (!archives || archives.length === 0) {
        archiveEl.innerHTML = '<p style="color:var(--muted)">視聴可能なアーカイブ動画はまだありません。</p>'
      } else {
        archiveEl.innerHTML = archives.map(a => `
            <article class="seminar-card">
              <div class="thumb video"${a.thumbnail_url ? ` style="background-image:linear-gradient(rgba(8,28,56,.06),rgba(8,28,56,.18)),url('${rwEscape(a.thumbnail_url)}')"` : ''}></div>
              <div>
                <p class="meta">${rwEscape(rwFormatDate(a.date))}${a.expires_at ? ` / 視聴期限 ${rwEscape(a.expires_at.replace('T',' '))}まで` : ''}</p>
                <h3>${rwEscape(a.title)}</h3>
                <p>申込済みセミナーのアーカイブ動画です。</p>
              </div>
              <a class="button" href="mypage-video.html?id=${encodeURIComponent(a.id)}">視聴する</a>
            </article>`).join('')
      }
    }
    init().catch(() => {
      document.getElementById('enrollment-list').innerHTML = '<p style="color:var(--muted)">情報の取得に失敗しました。再読み込みしてください。</p>'
    })

  </script>
</body>
</html>
