<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>決済完了 | Rewalk</title>
  <meta name="description" content="Rewalkセミナーの決済が完了しました。申込内容はメールでご確認ください。">
  <meta property="og:title" content="決済完了 | Rewalk">
  <meta property="og:description" content="Rewalkセミナーの決済が完了しました。申込内容はメールでご確認ください。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--pale), #fff);
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; transition: all .2s ease; }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px;
    }
    .card {
      max-width: 680px;
      background: #fff;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      padding: 48px;
      box-shadow: var(--shadow-card);
    }
    .card img { width: 160px; height: auto; display: block; }
    h1 {
      font-size: clamp(32px,5vw,44px);
      margin: 34px 0 14px;
      letter-spacing: -0.015em;
      font-weight: 800;
      line-height: 1.15;
    }
    .lead { color: var(--muted); line-height: 1.9; font-size: 15px; }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: var(--radius-ui);
      border: 0;
      font-weight: 700;
      font-size: 15px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      cursor: pointer;
      transition: all .2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,.35); }
    .ghost {
      background: #fff;
      color: var(--navy);
      border: 1px solid var(--line);
    }
    .ghost:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); box-shadow: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk">
      <h1 id="ps-title">決済が完了しました</h1>
      <p class="lead">申込内容をメールで送信しました。開催前のリマインドとLINE登録案内もお送りします。</p>
      <div class="actions">
        <a class="button" href="mypage.html">マイページへ</a>
        <a class="button ghost" href="index.html">セミナーへ戻る</a>
      </div>
    </section>
  </main>
  <script>
    if (new URLSearchParams(location.search).get('free') === '1') {
      document.getElementById('ps-title').textContent = '申込が完了しました'
    }
  </script>
</body>
</html>
