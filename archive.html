<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アーカイブ | Rewalk</title>
  <meta name="description" content="歩行再建に関わる評価・介入・疾患理解を学べるRewalkのアーカイブ動画一覧。購入後30日間視聴可能。">
  <meta property="og:title" content="アーカイブ | Rewalk">
  <meta property="og:description" content="歩行再建に関わる評価・介入・疾患理解を学べるRewalkのアーカイブ動画一覧。購入後30日間視聴可能。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--white);
      letter-spacing: 0;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; transition: all .2s ease; }

    /* ナビ */
    #menu-toggle { display: none; }
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5vw;
      background: rgba(255,255,255,.85);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(16px) saturate(1.4);
    }
    .logo img { display: block; width: 176px; height: auto; }
    .nav-links {
      display: flex;
      gap: 28px;
      font-weight: 600;
      font-size: 14px;
      align-items: center;
    }
    .nav-links a[href="archive.html"] { color: var(--blue); }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff !important;
      font-weight: 700;
      font-size: 13px;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all .2s ease;
    }
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-soft);
      padding: 8px 5vw 16px;
    }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 15px;
      font-weight: 600;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    #menu-toggle:checked ~ .mobile-menu { display: flex; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(2) { opacity: 0; }
    #menu-toggle:checked ~ .nav .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ヒーロー */
    .page {
      padding: 64px 5vw 96px;
      background: radial-gradient(120% 140% at 80% 0%, #16407c 0%, var(--dark) 55%);
      position: relative;
      overflow: hidden;
    }
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .page::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,.15);
    }
    .title {
      color: #fff;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      margin: 10px 0 0;
      font-size: clamp(42px, 6vw, 78px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.015em;
    }

    /* グリッド */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      position: relative;
      z-index: 1;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: all .2s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); }
    .img {
      aspect-ratio: 16 / 9;
      background:
        linear-gradient(rgba(7,31,61,.06), rgba(7,31,61,.28)),
        url("assets/archive-clinical-reasoning.png") center / cover no-repeat;
      position: relative;
    }
    .card:nth-child(2) .img {
      background-image:
        linear-gradient(rgba(7,31,61,.06), rgba(7,31,61,.28)),
        url("assets/science-workshop.png");
    }
    .card:nth-child(3) .img {
      background-image:
        linear-gradient(rgba(7,31,61,.06), rgba(7,31,61,.28)),
        url("assets/seminar-gait-analysis.png");
    }
    .img::after {
      content: "▶";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 32px;
      background: rgba(0,0,0,.16);
    }
    .body { padding: 22px; }
    .tag {
      color: var(--navy);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #BBD0F2;
      padding: 4px 10px;
      border-radius: 999px;
      display: inline-block;
    }
    .body h2 {
      font-size: 20px;
      line-height: 1.45;
      margin: 10px 0 16px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .meta { color: var(--muted); line-height: 1.8; font-size: 13px; margin: 0; }
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
      font-weight: 700;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      border: none;
      transition: all .2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.4); }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links { display: none; }
      .grid { grid-template-columns: 1fr; }
      .page { padding: 48px 24px 72px; }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="menu-toggle">
  <div class="nav-wrap">
    <header class="nav">
      <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
      <nav class="nav-links">
        <a href="index.html">セミナー</a>
        <a href="archive.html">アーカイブ</a>
        <a href="science.html">事業紹介</a>
        <a href="mypage.html" class="nav-cta">マイページ</a>
      </nav>
      <label for="menu-toggle" class="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </label>
    </header>
    <nav class="mobile-menu">
      <a href="index.html">セミナー</a>
      <a href="archive.html">アーカイブ</a>
      <a href="science.html">事業紹介</a>
      <a href="mypage.html">マイページ</a>
    </nav>
  </div>

  <main class="page">
    <div class="title">
      <span class="eyebrow">Archive</span>
      <h1>アーカイブ動画</h1>
    </div>
    <section class="grid" id="archive-grid">
      <p style="color:var(--muted)">読み込み中...</p>
    </section>
  </main>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    async function loadArchives() {
      const grid = document.getElementById('archive-grid')
      try {
        const items = await apiFetch('/archives', { redirectOn401: false })
        if (!items || items.length === 0) {
          grid.innerHTML = '<p style="color:var(--muted)">公開中のアーカイブはまだありません。</p>'
          return
        }
        grid.innerHTML = items.map(a => `
      <article class="card">
        <div class="img"></div>
        <div class="body">
          <span class="tag">アーカイブ</span>
          <h2>${rwEscape(a.title)}</h2>
          <p class="meta">${rwEscape(a.description || '')}</p>
          <div class="bottom">
            <span>${rwFormatPrice(a.price)}</span>
            <a class="button" href="archive-detail.html?id=${encodeURIComponent(a.id)}">詳細</a>
          </div>
        </div>
      </article>`).join('')
      } catch (e) {
        grid.innerHTML = '<p style="color:var(--muted)">アーカイブ情報の取得に失敗しました。</p>'
      }
    }
    loadArchives()
  </script>
</body>
</html>
