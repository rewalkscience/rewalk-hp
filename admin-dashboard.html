<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面のダッシュボード。申込・セミナー・動画・会員の概況をひと目で確認できます。">
  <meta name="robots" content="noindex">
  <title>管理ダッシュボード | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      background: #F1F5FB;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { text-decoration: none; color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      min-height: 100vh;
    }
    /* Sidebar */
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    /* Main */
    .main { padding: 36px 40px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    /* Stat cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      padding: 22px 24px;
      box-shadow: var(--shadow-card);
      transition: all .2s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 18px 40px -12px rgba(22,58,109,.24); }
    .card span {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .card strong {
      display: block;
      font-family: "Inter", sans-serif;
      font-size: 36px;
      font-weight: 700;
      margin-top: 10px;
      color: var(--navy);
      letter-spacing: -0.02em;
    }
    /* Panel */
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .panel h2 {
      margin: 0;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      font-weight: 700;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    tbody td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }
    tbody tr:last-child td { border-bottom: none; }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a class="active" href="admin-dashboard.html">ダッシュボード</a>
        <a href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-users.html">会員一覧</a>
        <a href="admin-coupons.html">クーポン管理</a>
        <a href="admin-broadcast.html">会員へのお知らせ配信</a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <h1>ダッシュボード</h1>
        <button onclick="logout()" style="background:none;border:1px solid #e2e8f0;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;color:#64748b;">ログアウト</button>
      </div>
      <section class="grid" id="stats-grid">
        <div class="card"><span>今月申込</span><strong id="stat-monthly">—</strong></div>
        <div class="card"><span>公開セミナー</span><strong id="stat-seminars">—</strong></div>
        <div class="card"><span>会員数</span><strong id="stat-users">—</strong></div>
        <div class="card"><span>累計申込</span><strong id="stat-total">—</strong></div>
      </section>
      <section class="panel">
        <h2>直近の申込</h2>
        <table>
          <thead>
            <tr>
              <th scope="col">日時</th>
              <th scope="col">氏名</th>
              <th scope="col">セミナー</th>
              <th scope="col">状態</th>
            </tr>
          </thead>
          <tbody id="enroll-tbody">
            <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:24px">読み込み中…</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    const API = API_BASE
    const token = localStorage.getItem('rw_token')
    if (!token || localStorage.getItem('rw_role') !== 'admin') location.href = 'auth-login.html'

    const STATUS = { pending: '未決済', paid: '決済済', cancelled: 'キャンセル' }
    const thisMonth = new Date().toISOString().slice(0, 7)

    async function load() {
      const [enrollRes, seminarRes, userRes] = await Promise.all([
        fetch(`${API}/admin/enrollments`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${API}/admin/seminars`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${API}/admin/users`, { headers: { Authorization: `Bearer ${token}` } }),
      ])
      if (enrollRes.status === 401) { location.href = 'auth-login.html'; return }

      const enrollments = await enrollRes.json()
      const seminars = await seminarRes.json()
      const users = await userRes.json()

      const monthlyCount = enrollments.filter(e => e.status === 'paid' && e.created_at?.startsWith(thisMonth)).length
      const publishedCount = seminars.filter(s => s.status === 'published').length

      document.getElementById('stat-monthly').textContent = monthlyCount
      document.getElementById('stat-seminars').textContent = publishedCount
      document.getElementById('stat-users').textContent = users.length
      document.getElementById('stat-total').textContent = enrollments.filter(e => e.status === 'paid').length

      const recent = enrollments.slice(0, 10)
      const tbody = document.getElementById('enroll-tbody')
      if (!recent.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:24px">申込がまだありません</td></tr>'
        return
      }
      tbody.innerHTML = recent.map(e => `
        <tr>
          <td>${e.created_at?.slice(0,10).replace(/-/g,'.') || '—'}</td>
          <td>${e.name || e.email || '—'}</td>
          <td>${e.seminar_title || '—'}</td>
          <td><span style="color:${e.status==='paid'?'#16a34a':e.status==='cancelled'?'#dc2626':'#64748b'}">${STATUS[e.status]||e.status}</span></td>
        </tr>`).join('')
    }

    function logout() {
      fetch(`${API}/auth/logout`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } })
      localStorage.clear()
      location.href = 'auth-login.html'
    }

    load()
  </script>
</body>
</html>
