<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面のクーポン管理。LINE配布用クーポンの作成・発行済みコードの利用状況を確認できます。">
  <meta name="robots" content="noindex">
  <title>クーポン管理 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --green: #128C7E;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: #F1F5FB;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { text-decoration: none; color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      min-height: 100vh;
    }
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    .main { padding: 36px 40px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 20px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: var(--white);
      font-weight: 700;
      font-size: 13.5px;
      transition: all .2s ease;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
      cursor: pointer;
      border: none;
    }
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,.38);
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .panel h2 {
      margin: 0;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      font-weight: 700;
    }
    .form {
      display: grid;
      gap: 14px;
      padding: 22px;
    }
    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    input, select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      padding: 0 13px;
      font: inherit;
      font-size: 14px;
      background: var(--white);
      color: var(--ink);
      transition: all .2s ease;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      outline: none;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    tbody td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }
    tbody tr:last-child td { border-bottom: none; }
    .code {
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-weight: 700;
      color: var(--navy);
    }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: #EAFBF5;
      color: var(--green);
      font-weight: 700;
      font-size: 12px;
    }
    .note {
      padding: 14px 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
      border-top: 1px solid var(--line);
      background: #FBFDFF;
    }
    @media (max-width: 900px) {
      .shell, .grid { grid-template-columns: 1fr; }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
      .top { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-users.html">会員一覧</a>
        <a class="active" href="admin-coupons.html">クーポン管理</a>
        <a href="admin-broadcast.html">会員へのお知らせ配信</a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <h1>クーポン管理</h1>
        <button type="button" class="button">新規クーポンを保存</button>
      </div>
      <div class="grid">
        <section class="panel">
          <h2>LINE配布用クーポン</h2>
          <div class="form">
            <label>コード<input type="text" placeholder="例: LINE2026" value="LINE2026"></label>
            <label>対象
              <select>
                <option>歩行分析の再構成</option>
                <option>すべての公開セミナー</option>
              </select>
            </label>
            <label>割引方式
              <select>
                <option>固定額</option>
                <option>割合</option>
              </select>
            </label>
            <label>割引額<input type="number" placeholder="0" value="1000"></label>
            <label>有効期限<input type="date" value="2027-05-31"></label>
            <label>利用上限<input type="number" placeholder="0" value="300"></label>
          </div>
          <p class="note">LINEでコードを配布し、申込フォームで入力された時だけサーバー側で検証して割引します。</p>
        </section>
        <section class="panel">
          <h2>発行済み</h2>
          <table>
            <thead>
              <tr>
                <th scope="col">コード</th>
                <th scope="col">対象</th>
                <th scope="col">割引</th>
                <th scope="col">利用</th>
                <th scope="col">期限</th>
                <th scope="col">状態</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="code">LINE2026</td>
                <td>歩行分析の再構成</td>
                <td>¥1,000</td>
                <td>24 / 300</td>
                <td>2027.05.31</td>
                <td><span class="status">有効</span></td>
              </tr>
              <tr>
                <td class="code">WELCOME500</td>
                <td>すべての公開セミナー</td>
                <td>¥500</td>
                <td>86 / 500</td>
                <td>2026.12.31</td>
                <td><span class="status">有効</span></td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
