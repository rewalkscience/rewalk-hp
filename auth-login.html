<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | Rewalk</title>
  <meta name="description" content="Rewalkアカウントにログイン。申込履歴・購入済みアーカイブの視聴・視聴期限の確認はこちらから。">
  <meta property="og:title" content="ログイン | Rewalk">
  <meta property="og:description" content="Rewalkアカウントにログイン。申込履歴・購入済みアーカイブの視聴・視聴期限の確認はこちらから。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rewalk">
  <meta property="og:image" content="assets/logo/rewalk-logo-horizontal.png">
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
      --shadow-pop: 0 24px 64px -16px rgba(11,31,61,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, sans-serif;
      background: #fff;
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: all .2s ease; }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0,1fr) 46vw;
    }
    .form-side {
      display: grid;
      align-content: center;
      padding: 56px 8vw;
    }
    .logo img { width: 176px; height: auto; display: block; margin-bottom: 48px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--navy);
    }
    h1 {
      margin: 14px 0 30px;
      font-size: clamp(36px,5vw,64px);
      line-height: 1.1;
      letter-spacing: -0.015em;
      font-weight: 800;
    }
    .panel { max-width: 460px; }
    label {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      padding: 14px 13px;
      font: inherit;
      color: var(--ink);
      background: #fff;
      transition: all .2s ease;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: var(--radius-ui);
      border: 0;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      margin-top: 22px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(37,99,235,.35);
    }
    .sub {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 600;
    }
    .sub a:hover { color: var(--blue); }
    .visual {
      background: linear-gradient(90deg,rgba(11,31,61,.88),rgba(11,31,61,.38)),
                  url("assets/science-evidence-practice-bg.png") center/cover no-repeat;
      position: relative;
    }
    .visual-card {
      position: absolute;
      left: 40px;
      right: 40px;
      bottom: 40px;
      padding: 28px;
      border-radius: var(--radius-card);
      background: rgba(255,255,255,.94);
      box-shadow: var(--shadow-pop);
    }
    .visual-card strong {
      display: block;
      color: var(--navy);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .visual-card p { margin: 0; color: var(--muted); line-height: 1.8; font-size: 14px; }
    @media (max-width:900px) {
      .shell { grid-template-columns: 1fr; }
      .visual { display: none; }
      .form-side { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="form-side">
      <a class="logo" href="index.html"><img src="assets/logo/rewalk-logo-horizontal.png" alt="Rewalk"></a>
      <div class="panel">
        <span class="eyebrow">Login</span>
        <h1>ログイン</h1>
        <div id="error-msg" style="display:none;padding:12px 16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;color:#B91C1C;font-size:14px;margin-bottom:16px;"></div>
        <label>メールアドレス
          <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
        </label>
        <label>パスワード
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </label>
        <button class="button" id="login-btn" onclick="doLogin()">ログインする</button>
        <div class="sub">
          <a href="auth-register.html">新規登録</a>
          <a href="#">パスワードを忘れた方</a>
        </div>
      </div>
    </section>
    <section class="visual">
      <div class="visual-card">
        <strong>申込履歴と購入動画を一つの場所に。</strong>
        <p>ログイン後、参加予定のセミナー、購入済みアーカイブ、視聴期限を確認できます。</p>
      </div>
    </section>
  </main>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    const API = API_BASE

    // ログイン済みなら即リダイレクト
    if (localStorage.getItem('rw_token')) {
      const role = localStorage.getItem('rw_role')
      location.href = role === 'admin' ? 'admin-dashboard.html' : 'mypage.html'
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('login-btn')
      const errEl = document.getElementById('error-msg')
      errEl.style.display = 'none'
      if (!email || !password) { showError('メールとパスワードを入力してください'); return }

      btn.textContent = '...'
      btn.disabled = true
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        })
        const data = await res.json()
        if (!res.ok) { showError(data.error || 'ログインに失敗しました'); return }
        localStorage.setItem('rw_token', data.token)
        localStorage.setItem('rw_role', data.user.role)
        localStorage.setItem('rw_user', JSON.stringify(data.user))
        location.href = data.user.role === 'admin' ? 'admin-dashboard.html' : 'mypage.html'
      } catch {
        showError('通信エラーが発生しました。時間をおいて再試行してください。')
      } finally {
        btn.textContent = 'ログインする'
        btn.disabled = false
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.style.display = 'block'
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
  </script>
</body>
</html>
