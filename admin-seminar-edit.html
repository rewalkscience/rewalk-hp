<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面のセミナー編集。基本情報・本文エディター・画像スロットを管理できます。">
  <meta name="robots" content="noindex">
  <title>セミナー編集 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #F1F5FB;
      color: var(--ink);
      font-family: "Noto Sans JP", "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { color: inherit; text-decoration: none; }
    .shell {
      display: grid;
      grid-template-columns: 256px minmax(0, 1fr);
      min-height: 100vh;
    }
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    .main { padding: 30px 36px 54px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }
    .crumb {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 6px 0 0;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.015em;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: var(--radius-ui);
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--navy);
      font-weight: 700;
      font-size: 13.5px;
      transition: all .2s ease;
      cursor: pointer;
    }
    .button:hover { background: var(--pale); }
    .button.primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
    }
    .button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,.38);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .panel-head {
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .panel-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }
    .panel-body { padding: 22px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }
    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      padding: 11px 13px;
      color: var(--ink);
      background: var(--white);
      font: inherit;
      font-size: 14px;
      transition: all .2s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      outline: none;
    }
    textarea { min-height: 120px; resize: vertical; line-height: 1.75; }
    .editor {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: var(--white);
    }
    .editor-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--pale);
    }
    .tool {
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--navy);
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
    }
    .tool:hover { background: var(--pale); border-color: var(--blue); color: var(--blue); }
    .editor-canvas {
      display: grid;
      gap: 18px;
      min-height: 420px;
      padding: 22px;
    }
    .edit-block {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
      transition: all .2s ease;
    }
    .edit-block:hover { border-color: var(--line); background: #FCFDFF; }
    .edit-block h2 { margin: 0; font-size: 22px; font-weight: 700; line-height: 1.35; letter-spacing: -0.015em; }
    .edit-block p { margin: 0; color: var(--ink); line-height: 1.9; font-size: 15px; }
    .edit-block ul { margin: 0; padding-left: 1.2em; line-height: 1.9; color: var(--ink); }
    .edit-image {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 18px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: var(--pale);
    }
    .edit-image-preview {
      aspect-ratio: 16 / 10;
      border-radius: 8px;
      background: url("assets/seminar-gait-analysis.png") center / cover no-repeat;
    }
    .edit-image:nth-of-type(5) .edit-image-preview { background-image: url("assets/seminar-orthosis.png"); }
    .edit-image strong { color: var(--navy); font-weight: 700; }
    .edit-image p { color: var(--muted); margin-top: 5px; font-size: 13px; }
    .image-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .slot {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      overflow: hidden;
      background: var(--white);
      box-shadow: 0 1px 3px rgba(15,23,42,.04);
    }
    .slot-img {
      aspect-ratio: 4 / 3;
      background: url("assets/seminar-gait-analysis.png") center / cover no-repeat;
    }
    .slot:nth-child(2) .slot-img { background-image: url("assets/seminar-orthosis.png"); }
    .slot:nth-child(3) .slot-img { background-image: url("assets/archive-clinical-reasoning.png"); }
    .slot-body { padding: 12px; display: grid; gap: 8px; }
    .slot-code {
      color: var(--navy);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
    }
    .preview {
      position: sticky;
      top: 24px;
    }
    .preview-hero {
      aspect-ratio: 16 / 10;
      border-radius: var(--radius-card) var(--radius-card) 0 0;
      background:
        linear-gradient(90deg, rgba(11,31,61,.88), rgba(11,31,61,.35)),
        url("assets/seminar-gait-analysis.png") center / cover no-repeat;
    }
    .preview-body { padding: 22px; }
    .tag {
      display: inline-flex;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--pale);
      color: var(--navy);
      font-size: 11.5px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: .06em;
    }
    .preview h2 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.015em;
    }
    .preview p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .inline-image {
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      background: url("assets/seminar-orthosis.png") center / cover no-repeat;
      margin: 16px 0;
    }
    .note {
      margin-top: 16px;
      padding: 13px 16px;
      border-radius: var(--radius-ui);
      background: var(--pale);
      color: var(--navy);
      line-height: 1.7;
      font-size: 13px;
      font-weight: 600;
    }
    @media (max-width: 1080px) {
      .shell,
      .layout,
      .form-grid,
      .image-slots {
        grid-template-columns: 1fr;
      }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
      .preview { position: static; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="index.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a class="active" href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-users.html">会員一覧</a>
        <a href="admin-coupons.html">クーポン管理</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <div class="crumb">Admin / Seminars / <span id="mode-label">新規作成</span></div>
          <h1 id="page-title">セミナー新規作成</h1>
        </div>
        <div class="actions">
          <button type="button" class="button" id="preview-link-btn" onclick="copyPreviewLink()" style="display:none;">プレビューURLをコピー</button>
          <button type="button" class="button" id="draft-btn" onclick="save('draft')">下書き保存</button>
          <button type="button" class="button primary" id="publish-btn" onclick="save('published')">公開する</button>
        </div>
      </div>
      <div id="save-msg" style="display:none;margin-bottom:16px;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:600;"></div>

      <div class="layout">
        <div class="panel">
          <div class="panel-head"><h2>基本情報</h2></div>
          <div class="panel-body">
            <div class="form-grid">
              <label>タイトル<input type="text" id="f-title" placeholder="セミナータイトルを入力"></label>
              <label>開催日時<input type="datetime-local" id="f-date"></label>
              <label>場所・会場名<input type="text" id="f-location" placeholder="Zoom / 東京会場など"></label>
              <label>形式
                <select id="f-format">
                  <option value="online">オンライン</option>
                  <option value="offline">対面</option>
                </select>
              </label>
              <label>参加費（円）<input type="number" id="f-price" placeholder="0" min="0"></label>
              <label>定員<input type="number" id="f-capacity" placeholder="20" min="1"></label>
              <label>申込開始日時<input type="datetime-local" id="f-enroll-start"></label>
              <label>申込終了日時<input type="datetime-local" id="f-enroll-end"></label>
            </div>
            <label style="display:grid;gap:7px;color:#64748b;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;">
              Zoom URL（オンラインの場合）<input type="url" id="f-zoom" placeholder="https://zoom.us/j/...">
            </label>
            <label style="display:grid;gap:7px;color:#64748b;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">
              説明文（本文）
              <div class="editor">
                <div class="editor-bar">
                  <button type="button" class="tool" onclick="fmt('bold')"><b>B</b></button>
                  <button type="button" class="tool" onclick="fmt('italic')"><i>I</i></button>
                  <button type="button" class="tool" onclick="fmtBlock('h2')">見出し</button>
                  <button type="button" class="tool" onclick="fmtBlock('p')">本文</button>
                  <button type="button" class="tool" onclick="fmt('insertUnorderedList')">箇条書き</button>
                  <button type="button" class="tool" onclick="fmtLink()">リンク</button>
                </div>
                <div class="editor-canvas" id="editor" contenteditable="true" style="min-height:280px;outline:none;">
                  <p>ここに説明文を入力してください。</p>
                </div>
              </div>
            </label>
            <label style="display:grid;gap:7px;color:#64748b;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:16px;">
              サムネイル画像URL<input type="url" id="f-thumbnail" placeholder="https://...">
            </label>
          </div>
        </div>

        <aside class="panel preview">
          <div class="preview-hero" id="preview-hero"></div>
          <div class="preview-body">
            <span class="tag">プレビュー</span>
            <h2 id="preview-title">（タイトルを入力）</h2>
            <p id="preview-date" style="color:#64748b;font-size:13px;"></p>
            <p id="preview-price" style="font-weight:700;"></p>
          </div>
        </aside>
      </div>

      <div class="panel" style="margin-top:24px;" id="archive-panel">
        <div class="panel-head"><h2>アーカイブ動画設定（参加者限定）</h2></div>
        <div class="panel-body">
          <div class="form-grid">
            <label style="grid-column:1/-1;">動画URL（YouTube / Googleドライブ共有リンク）<input type="url" id="f-archive-url" placeholder="https://..."></label>
            <label>視聴可能期限<input type="datetime-local" id="f-archive-expires"></label>
          </div>
          <div id="archive-preview-wrap" style="display:none;margin-bottom:16px;">
            <iframe id="archive-preview" style="width:100%;aspect-ratio:16/9;border:1px solid var(--line);border-radius:var(--radius-ui);" allowfullscreen></iframe>
          </div>
          <button type="button" class="button" id="notify-btn" onclick="notifyArchive()" style="display:none;">申込者に一斉お知らせを送る</button>
          <p class="note" style="margin-top:12px;">動画URLを設定して保存すると、申込者限定の視聴期限付きアーカイブとして扱われます。「一斉お知らせ」を押すと、支払済みの申込者全員にメールで案内が届きます。</p>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/api.js?v=1"></script>
  <script>
    const API = API_BASE
    const token = localStorage.getItem('rw_token')
    if (!token || localStorage.getItem('rw_role') !== 'admin') location.href = 'auth-login.html'

    const params = new URLSearchParams(location.search)
    let editId = params.get('id')
    let currentStatus = 'draft'

    if (editId) {
      document.getElementById('mode-label').textContent = '編集'
      document.getElementById('page-title').textContent = 'セミナー編集'
      document.getElementById('preview-link-btn').style.display = ''
      loadSeminar()
    }

    function copyPreviewLink() {
      const url = `${location.origin}${location.pathname.replace(/admin-seminar-edit\.html$/, 'seminar-detail.html')}?id=${editId}`
      navigator.clipboard.writeText(url).then(() => {
        showMsg('プレビューURLをコピーしました（下書きでも講師に共有して内容確認できます）', true)
      }).catch(() => {
        prompt('コピーに失敗しました。手動でコピーしてください:', url)
      })
    }

    async function loadSeminar() {
      const res = await fetch(`${API}/admin/seminars/${editId}`, { headers: { Authorization: `Bearer ${token}` } })
      if (!res.ok) { alert('データの読み込みに失敗しました'); return }

      // admin APIから全フィールド取得
      const all = await fetch(`${API}/admin/seminars`, { headers: { Authorization: `Bearer ${token}` } })
      const list = await all.json()
      const s = list.find(x => x.id === editId)
      if (!s) { alert('セミナーが見つかりません'); return }

      document.getElementById('f-title').value = s.title || ''
      document.getElementById('f-date').value = s.date ? s.date.slice(0,16) : ''
      document.getElementById('f-location').value = s.location || ''
      document.getElementById('f-format').value = s.format || 'online'
      document.getElementById('f-price').value = s.price || 0
      document.getElementById('f-capacity').value = s.capacity || 20
      document.getElementById('f-zoom').value = s.zoom_url || ''
      document.getElementById('f-thumbnail').value = s.thumbnail_url || ''
      document.getElementById('f-enroll-start').value = s.enrollment_start ? s.enrollment_start.slice(0,16) : ''
      document.getElementById('f-enroll-end').value = s.enrollment_end ? s.enrollment_end.slice(0,16) : ''
      document.getElementById('f-archive-url').value = s.archive_video_url || ''
      document.getElementById('f-archive-expires').value = s.archive_expires_at ? s.archive_expires_at.slice(0,16) : ''
      document.getElementById('editor').innerHTML = s.description || '<p>説明を入力してください。</p>'
      currentStatus = s.status
      updatePreview()
      updateArchivePreview()
      document.getElementById('notify-btn').style.display = s.archive_video_url ? '' : 'none'
    }

    function toEmbedUrl(url) {
      if (!url) return ''
      const yt = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([\w-]+)/)
      if (yt) return `https://www.youtube.com/embed/${yt[1]}`
      const drive = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/)
      if (drive) return `https://drive.google.com/file/d/${drive[1]}/preview`
      return url
    }

    function updateArchivePreview() {
      const url = document.getElementById('f-archive-url').value.trim()
      const wrap = document.getElementById('archive-preview-wrap')
      if (!url) { wrap.style.display = 'none'; return }
      document.getElementById('archive-preview').src = toEmbedUrl(url)
      wrap.style.display = 'block'
    }
    document.getElementById('f-archive-url').addEventListener('change', updateArchivePreview)

    async function notifyArchive() {
      if (!editId) return
      if (!confirm('このセミナーの申込者全員にアーカイブ視聴のお知らせメールを送信します。よろしいですか？')) return
      const btn = document.getElementById('notify-btn')
      btn.disabled = true
      btn.textContent = '送信中...'
      try {
        const res = await fetch(`${API}/admin/seminars/${editId}/notify-archive`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
        })
        const data = await res.json()
        if (!res.ok) { alert(data.error || '送信に失敗しました'); return }
        alert(`${data.sent} / ${data.total} 件に送信しました`)
      } finally {
        btn.disabled = false
        btn.textContent = '申込者に一斉お知らせを送る'
      }
    }

    async function save(status) {
      const title = document.getElementById('f-title').value.trim()
      const date = document.getElementById('f-date').value
      const location = document.getElementById('f-location').value.trim()
      if (!title || !date || !location) { showMsg('タイトル・日時・場所は必須です', false); return }

      const body = {
        title, date, location,
        format: document.getElementById('f-format').value,
        price: parseInt(document.getElementById('f-price').value) || 0,
        capacity: parseInt(document.getElementById('f-capacity').value) || 20,
        zoom_url: document.getElementById('f-zoom').value.trim() || null,
        thumbnail_url: document.getElementById('f-thumbnail').value.trim() || null,
        enrollment_start: document.getElementById('f-enroll-start').value || null,
        enrollment_end: document.getElementById('f-enroll-end').value || null,
        archive_video_url: document.getElementById('f-archive-url').value.trim() || null,
        archive_expires_at: document.getElementById('f-archive-expires').value || null,
        description: document.getElementById('editor').innerHTML,
        status,
      }

      const url = editId ? `${API}/admin/seminars/${editId}` : `${API}/admin/seminars`
      const method = editId ? 'PUT' : 'POST'
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      })
      const data = await res.json()
      if (!res.ok) { showMsg(data.error || '保存に失敗しました', false); return }

      showMsg(status === 'published' ? '公開しました' : '下書き保存しました', true)
      if (!editId && data.id) {
        editId = data.id
        history.replaceState(null, '', `?id=${editId}`)
        document.getElementById('mode-label').textContent = '編集'
        document.getElementById('page-title').textContent = 'セミナー編集'
        document.getElementById('preview-link-btn').style.display = ''
      }
      document.getElementById('notify-btn').style.display = body.archive_video_url ? '' : 'none'
    }

    function showMsg(msg, ok) {
      const el = document.getElementById('save-msg')
      el.textContent = msg
      el.style.background = ok ? '#F0FDF4' : '#FEF2F2'
      el.style.color = ok ? '#15803D' : '#B91C1C'
      el.style.border = `1px solid ${ok ? '#BBF7D0' : '#FECACA'}`
      el.style.display = 'block'
      setTimeout(() => el.style.display = 'none', 3000)
    }

    function updatePreview() {
      const title = document.getElementById('f-title').value || '（タイトルを入力）'
      const date = document.getElementById('f-date').value
      const price = parseInt(document.getElementById('f-price').value) || 0
      const thumb = document.getElementById('f-thumbnail').value
      document.getElementById('preview-title').textContent = title
      document.getElementById('preview-date').textContent = date ? date.replace('T', ' ') : ''
      document.getElementById('preview-price').textContent = `¥${price.toLocaleString()}`
      if (thumb) document.getElementById('preview-hero').style.backgroundImage = `url(${thumb})`
    }

    document.getElementById('f-title').addEventListener('input', updatePreview)
    document.getElementById('f-date').addEventListener('input', updatePreview)
    document.getElementById('f-price').addEventListener('input', updatePreview)
    document.getElementById('f-thumbnail').addEventListener('input', updatePreview)

    function fmt(cmd) { document.execCommand(cmd, false, null) }
    function fmtBlock(tag) { document.execCommand('formatBlock', false, tag) }
    function fmtLink() {
      const url = prompt('URL を入力:')
      if (url) document.execCommand('createLink', false, url)
    }
  </script>
</body>
</html>
