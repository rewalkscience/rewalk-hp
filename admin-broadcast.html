<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rewalk管理画面から全会員へ任意のメールを一斉送信します。">
  <meta name="robots" content="noindex">
  <title>会員へのお知らせ配信 | Rewalk Admin</title>
  <link rel="icon" href="assets/logo/rewalk-logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #163A6D;
      --blue: #2563EB;
      --blue-deep: #1D4ED8;
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --line-soft: #EDF2F9;
      --pale: #F1F5FB;
      --white: #FFFFFF;
      --dark: #0B1F3D;
      --accent: #38BDF8;
      --radius-card: 16px;
      --radius-ui: 10px;
      --shadow-card: 0 1px 2px rgba(15,23,42,.05), 0 12px 32px -12px rgba(22,58,109,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: #F1F5FB;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "palt";
    }
    a { text-decoration: none; color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      min-height: 100vh;
    }
    .side {
      background: var(--dark);
      color: #fff;
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 32px;
      font-family: "Inter", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo img { width: 32px; height: 32px; display: block; }
    .side nav { display: grid; gap: 4px; }
    .side a {
      padding: 11px 14px;
      border-radius: var(--radius-ui);
      color: rgba(255,255,255,.62);
      font-weight: 600;
      font-size: 13.5px;
      transition: all .2s ease;
      border-left: 3px solid transparent;
    }
    .side a:hover { color: #fff; background: rgba(255,255,255,.06); }
    .side a.active {
      background: rgba(56,189,248,.16);
      color: #fff;
      border-left: 3px solid var(--accent);
    }
    .main { padding: 36px 40px; max-width: 720px; }
    h1 {
      margin: 0 0 28px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .panel-body { padding: 24px; display: grid; gap: 16px; }
    label {
      display: grid;
      gap: 7px;
      color: #64748b;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    input, textarea {
      font: inherit;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-ui);
      background: var(--pale);
      color: var(--ink);
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--blue); background: #fff; }
    textarea { min-height: 220px; resize: vertical; line-height: 1.7; }
    .note { margin: 0; color: var(--muted); font-size: 12.5px; line-height: 1.6; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 20px;
      border-radius: var(--radius-ui);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: var(--white);
      font-weight: 700;
      font-size: 13.5px;
      transition: all .2s ease;
      box-shadow: 0 2px 8px rgba(37,99,235,.28);
      cursor: pointer;
      border: none;
      width: fit-content;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.38); }
    .button:disabled { opacity: .6; cursor: default; transform: none; box-shadow: none; }
    #result {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius-ui);
      font-size: 13px;
      font-weight: 600;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; height: auto; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <a class="logo" href="admin-dashboard.html">
        <img src="assets/logo/rewalk-logo-mark.png" alt="Rewalk">Admin
      </a>
      <nav>
        <a href="admin-dashboard.html">ダッシュボード</a>
        <a href="admin-seminars.html">セミナー管理</a>
        <a href="admin-enrollments.html">申込者一覧</a>
        <a href="admin-users.html">会員一覧</a>
        <a class="active" href="admin-broadcast.html">会員へのお知らせ配信</a>
        <a href="admin-line-broadcast.html">LINE配信</a>
        <a href="admin-help.html">使い方</a>
      </nav>
    </aside>
    <main class="main">
      <h1>会員へのお知らせ配信</h1>
      <section class="panel">
        <div class="panel-body">
          <label>件名<input type="text" id="f-subject" placeholder="【Rewalk】お知らせ"></label>
          <label>本文<textarea id="f-body" placeholder="本文を入力してください"></textarea></label>
          <p class="note">登録済みの全会員（<span id="user-count">-</span>名）にメールを送信します。宛先を絞り込むことはできません。送信前に内容をよく確認してください。本文の末尾には「Rewalk Science」の署名が自動で付きます（入力不要）。</p>
          <button type="button" class="button" id="send-btn" onclick="send()">全会員に送信する</button>
          <div id="result"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/js/api.js?v=2"></script>
  <script>
    async function init() {
      if (!requireAdmin()) return
      try {
        const users = await apiFetch('/admin/users')
        document.getElementById('user-count').textContent = (users || []).length
      } catch { /* 件数取得失敗は無視 */ }
    }

    async function send() {
      const subject = document.getElementById('f-subject').value.trim()
      const body = document.getElementById('f-body').value.trim()
      if (!subject || !body) { alert('件名と本文を入力してください'); return }
      const count = document.getElementById('user-count').textContent
      if (!confirm(`登録済みの全会員（${count}名）にこのメールを送信します。よろしいですか？`)) return

      const btn = document.getElementById('send-btn')
      btn.disabled = true
      btn.textContent = '送信中...'
      const result = document.getElementById('result')
      try {
        const data = await apiFetch('/admin/broadcast', { method: 'POST', body: JSON.stringify({ subject, body }) })
        result.textContent = `${data.sent} / ${data.total} 件に送信しました`
        result.style.display = 'block'
        result.style.background = '#F0FDF4'
        result.style.color = '#15803D'
      } catch (err) {
        result.textContent = err.message
        result.style.display = 'block'
        result.style.background = '#FEF2F2'
        result.style.color = '#B91C1C'
      } finally {
        btn.disabled = false
        btn.textContent = '全会員に送信する'
      }
    }

    init()
  </script>
</body>
</html>
